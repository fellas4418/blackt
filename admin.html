<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIGGER BLACK · Admin</title>
    <meta name="theme-color" content="#050505">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cyber-theme.css">
    <style>
        body.admin-page {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-color);
            color: #fff;
            font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            position: relative;
        }
        body.admin-page::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.04) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .admin-wrap {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }
        .admin-head {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
        }
        .admin-head h1 {
            margin: 0 0 6px;
            font-family: var(--font-display, 'Orbitron', sans-serif);
            font-size: 1.15rem;
            letter-spacing: 0.08em;
            color: var(--neon-blue);
            text-shadow: var(--glow-text);
        }
        .admin-head p {
            margin: 0;
            font-size: 0.86rem;
            color: var(--text-muted);
        }
        .panel {
            background: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--cyber-radius-lg, 8px);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 0 16px rgba(0, 243, 255, 0.06);
        }
        .panel-title {
            margin: 0 0 12px;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--neon-blue);
            text-transform: uppercase;
        }
        label {
            display: block;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .auth-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .auth-input {
            flex: 1 1 200px;
            min-width: 0;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            padding: 10px 12px;
            font-size: 0.92rem;
        }
        .auth-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: var(--glow-blue);
        }
        .btn {
            border: 1px solid var(--neon-blue);
            background: transparent;
            color: var(--neon-blue);
            border-radius: 8px;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .btn:hover {
            background: rgba(0, 243, 255, 0.12);
        }
        .btn-ghost {
            border-color: #444;
            color: #aaa;
        }
        .status-bar {
            margin-top: 10px;
            font-size: 0.82rem;
            color: var(--text-muted);
            min-height: 1.2em;
        }
        .status-bar.error { color: #ff6b6b; }
        .status-bar.ok { color: var(--neon-green); }
        .table-scroll {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.84rem;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #222;
        }
        th {
            color: var(--neon-blue);
            font-weight: 700;
            font-size: 0.76rem;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        td.num { font-family: var(--font-mono, monospace); }
        tr.user-row {
            cursor: pointer;
            transition: background 0.12s;
        }
        tr.user-row:hover {
            background: rgba(0, 243, 255, 0.06);
        }
        tr.user-row.active {
            background: rgba(0, 243, 255, 0.1);
        }
        .detail-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .detail-user {
            font-family: var(--font-mono, monospace);
            font-size: 0.88rem;
            color: #fff;
        }
        .hide { display: none !important; }
        .empty {
            padding: 20px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.86rem;
        }
    </style>
</head>
<body class="admin-page">
    <div class="admin-wrap">
        <header class="admin-head">
            <h1>TRIGGER BLACK · ADMIN</h1>
            <p>D1 daily_session 진도 조회</p>
        </header>

        <section class="panel" id="login-panel">
            <h2 class="panel-title">Login</h2>
            <label for="admin-api-key">관리자 API 키 (Worker API_SECRET_KEY)</label>
            <div class="auth-row">
                <input type="password" id="admin-api-key" class="auth-input" autocomplete="off" placeholder="X-API-Secret">
                <button type="button" id="btn-login" class="btn">로그인 · 새로고침</button>
            </div>
            <div id="status-bar" class="status-bar"></div>
        </section>

        <section class="panel hide" id="summary-panel">
            <h2 class="panel-title">유저별 진도</h2>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>user_id</th>
                            <th>레벨</th>
                            <th>최근 학습일</th>
                            <th>완료 Day</th>
                            <th>평균 정확도</th>
                        </tr>
                    </thead>
                    <tbody id="summary-body"></tbody>
                </table>
            </div>
            <div id="summary-empty" class="empty hide">저장된 daily_session 데이터가 없습니다.</div>
        </section>

        <section class="panel hide" id="detail-panel">
            <div class="detail-head">
                <h2 class="panel-title" style="margin:0;">Day별 상세 · <span class="detail-user" id="detail-user-label"></span></h2>
                <button type="button" id="btn-detail-close" class="btn btn-ghost">닫기</button>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Day</th>
                            <th>레벨</th>
                            <th>정확도</th>
                            <th>오답 수</th>
                            <th>기록 시각</th>
                        </tr>
                    </thead>
                    <tbody id="detail-body"></tbody>
                </table>
            </div>
            <div id="detail-empty" class="empty hide">이 유저의 Day 기록이 없습니다.</div>
        </section>
    </div>

    <script>
        (function () {
            var WORKER_URL = 'https://trigger-ocr-api.ohryee.workers.dev';
            var STORAGE_KEY = 'trigger_exam_admin_api_key';

            var keyEl = document.getElementById('admin-api-key');
            var statusEl = document.getElementById('status-bar');
            var summaryPanel = document.getElementById('summary-panel');
            var summaryBody = document.getElementById('summary-body');
            var summaryEmpty = document.getElementById('summary-empty');
            var detailPanel = document.getElementById('detail-panel');
            var detailBody = document.getElementById('detail-body');
            var detailEmpty = document.getElementById('detail-empty');
            var detailUserLabel = document.getElementById('detail-user-label');
            var selectedUserId = '';

            keyEl.value = localStorage.getItem(STORAGE_KEY) || '';

            function persistKey() {
                var key = (keyEl.value || '').trim();
                if (key) localStorage.setItem(STORAGE_KEY, key);
                return key;
            }

            function setStatus(msg, type) {
                statusEl.textContent = msg || '';
                statusEl.className = 'status-bar' + (type ? ' ' + type : '');
            }

            function getApiKey() {
                return persistKey() || (localStorage.getItem(STORAGE_KEY) || '').trim();
            }

            async function adminFetch(path) {
                var apiKey = getApiKey();
                if (!apiKey) {
                    throw new Error('관리자 API 키를 입력해 주세요.');
                }
                var res = await fetch(WORKER_URL.replace(/\/$/, '') + path, {
                    method: 'GET',
                    headers: { 'X-API-Secret': apiKey }
                });
                var data = {};
                try { data = await res.json(); } catch (e) { data = {}; }
                if (!res.ok) {
                    throw new Error(data.error === 'unauthorized' ? 'API 키가 올바르지 않습니다.' : (data.error || '요청 실패 (' + res.status + ')'));
                }
                return data;
            }

            function fmtDate(raw) {
                if (!raw) return '—';
                var d = new Date(raw);
                if (isNaN(d.getTime())) return String(raw);
                return d.toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            }

            function renderSummary(items) {
                summaryBody.innerHTML = '';
                if (!items || !items.length) {
                    summaryEmpty.classList.remove('hide');
                    return;
                }
                summaryEmpty.classList.add('hide');
                items.forEach(function (row) {
                    var tr = document.createElement('tr');
                    tr.className = 'user-row' + (row.user_id === selectedUserId ? ' active' : '');
                    tr.dataset.userId = row.user_id;
                    tr.innerHTML =
                        '<td class="num">' + escapeHtml(row.user_id) + '</td>' +
                        '<td>' + escapeHtml(row.level || '—') + '</td>' +
                        '<td class="num">' + escapeHtml(fmtDate(row.last_study_at)) + '</td>' +
                        '<td class="num">' + escapeHtml(String(row.completed_days != null ? row.completed_days : '—')) + '</td>' +
                        '<td class="num">' + escapeHtml(row.avg_accuracy != null ? row.avg_accuracy + '%' : '—') + '</td>';
                    tr.addEventListener('click', function () {
                        loadDetail(row.user_id);
                    });
                    summaryBody.appendChild(tr);
                });
            }

            function renderDetail(items) {
                detailBody.innerHTML = '';
                if (!items || !items.length) {
                    detailEmpty.classList.remove('hide');
                    return;
                }
                detailEmpty.classList.add('hide');
                items.forEach(function (row) {
                    var tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td class="num">' + escapeHtml(String(row.day_num != null ? row.day_num : '—')) + '</td>' +
                        '<td>' + escapeHtml(row.level || '—') + '</td>' +
                        '<td class="num">' + escapeHtml(row.accuracy != null ? row.accuracy + '%' : '—') + '</td>' +
                        '<td class="num">' + escapeHtml(String(row.wrong_count != null ? row.wrong_count : '—')) + '</td>' +
                        '<td class="num">' + escapeHtml(fmtDate(row.created_at)) + '</td>';
                    detailBody.appendChild(tr);
                });
            }

            function escapeHtml(s) {
                return String(s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function highlightSelected() {
                summaryBody.querySelectorAll('.user-row').forEach(function (tr) {
                    tr.classList.toggle('active', tr.dataset.userId === selectedUserId);
                });
            }

            async function loadSummary() {
                setStatus('불러오는 중…');
                try {
                    var data = await adminFetch('/api/admin/daily-session');
                    summaryPanel.classList.remove('hide');
                    renderSummary(data.items || []);
                    setStatus('유저 ' + (data.items || []).length + '명 · ' + fmtDate(new Date()), 'ok');
                } catch (err) {
                    setStatus(err.message || String(err), 'error');
                }
            }

            async function loadDetail(userId) {
                selectedUserId = userId;
                highlightSelected();
                detailUserLabel.textContent = userId;
                detailPanel.classList.remove('hide');
                detailBody.innerHTML = '';
                detailEmpty.classList.add('hide');
                setStatus('Day 상세 불러오는 중… (' + userId + ')');
                try {
                    var data = await adminFetch('/api/admin/daily-session?user_id=' + encodeURIComponent(userId));
                    renderDetail(data.items || []);
                    setStatus('Day ' + (data.items || []).length + '건 · ' + userId, 'ok');
                } catch (err) {
                    setStatus(err.message || String(err), 'error');
                }
            }

            document.getElementById('btn-login').addEventListener('click', loadSummary);
            keyEl.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') loadSummary();
            });
            keyEl.addEventListener('change', persistKey);
            document.getElementById('btn-detail-close').addEventListener('click', function () {
                selectedUserId = '';
                highlightSelected();
                detailPanel.classList.add('hide');
            });

            if (getApiKey()) loadSummary();
        })();
    </script>
</body>
</html>
