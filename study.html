<script src="wordData_M.js"></script>
    <script src="wordData_H.js"></script>

    <script>
        // 💡 중요: app.js가 실행되기 전에 데이터를 시스템 규격에 맞게 매핑합니다.
        window.wordsData = {
            middle: typeof wordData_M !== 'undefined' ? wordData_M : [],
            high: typeof wordData_H !== 'undefined' ? wordData_H : []
        };
    </script>

    <script src="app.js"></script>

    <script>
        // 서비스 워커 등록 (기존 코드 유지)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('학습 페이지: 서비스 워커 등록 성공!'))
                    .catch(err => console.log('학습 페이지: 서비스 워커 등록 실패:', err));
            });
        }

        // 한글 감지 및 스타일 변경 (기존 코드 유지)
        window.addEventListener('DOMContentLoaded', () => {
            const targetEl = document.getElementById('target');
            if(targetEl) {
                const observer = new MutationObserver(() => {
                    const text = targetEl.innerText || "";
                    if (/[가-힣]/.test(text)) {
                        targetEl.classList.add('system-msg');
                    } else {
                        targetEl.classList.remove('system-msg');
                    }
                });
                observer.observe(targetEl, { childList: true, characterData: true, subtree: true });
            }
        });
    </script>
