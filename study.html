<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - Study</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="study-bg">
    <div id="app">
        <button class="back-btn" onclick="location.href='index.html'">← 메인으로</button>
        
        <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; align-items: center; z-index: 100;">
            <button id="pause-btn" onclick="togglePause()" style="background: transparent; border: 1px solid var(--neon-blue); color: #fff; padding: 5px 12px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold;">⏸ 일시중지</button>
            
            <button id="exit-btn" onclick="location.href='index.html'" 
                style="display: none; background: transparent; border: 1px solid #d2b48c; color: #d2b48c; padding: 5px 12px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; font-size: 0.9rem;">
                나가기
            </button>
            
            <button id="mute-toggle-btn" onclick="toggleMute()" style="background: transparent; border: none; font-size: 1.2rem; cursor: pointer; margin-left: 5px;">🔊</button>
        </div>

        <div class="header">
            <div id="session-tag" style="color:var(--neon-blue); font-weight:bold; font-size:1.1rem;">Session 1 / 6</div>
            <div class="progress-box"><div id="bar"></div></div>
        </div>
        
        <div id="display">
            <div id="target"></div>
            <div id="meanings"></div>
        </div>
        
        <div class="footer" style="display:none;"></div>
        </div>

    <script src="worddata.js"></script>
    <script>
        window.wordsData = typeof wordsData !== 'undefined' ? wordsData : { middle: {}, high: {} };
    </script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(err => console.log(err));
            });
        }
        window.addEventListener('DOMContentLoaded', () => {
            const targetEl = document.getElementById('target');
            if(targetEl) {
                const observer = new MutationObserver(() => {
                    const text = targetEl.innerText || "";
                    if (/[가-힣]/.test(text)) targetEl.classList.add('system-msg');
                    else targetEl.classList.remove('system-msg');
                });
                observer.observe(targetEl, { childList: true, characterData: true, subtree: true });
            }
        });
    </script>
</body>
</html>
