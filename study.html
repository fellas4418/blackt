<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - Study</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <style>
        /* [수정] 납작하고 세련된 세로 배열 + 퍼플 색상 적용 */
        .energy-slot-vert { 
            width: 26px; /* 가로로 납작하게 */
            height: 6px; /* 세로로 얇게 */
            background: #222; 
            border: 1px solid #333; 
            border-radius: 3px; 
            transition: all 0.3s ease; 
        }
        .energy-slot-vert.active { 
            background: var(--neon-purple); /* 진행바(파란색)와 대비되는 보라색 */
            box-shadow: 0 0 10px var(--neon-purple); 
            border-color: #fff; 
        }
    </style>
</head>
<body class="study-bg">
    <div id="app">
        <button class="back-btn" onclick="location.href='index.html'">← 메인으로</button>
        
        <div style="position: absolute; top: 65px; left: 20px; display: flex; flex-direction: column; gap: 5px; align-items: center; z-index: 100;">
            <div style="font-size: 0.65rem; color: #666; font-weight: bold; margin-bottom: 2px;">LOOP</div>
            <div id="slot-2" class="energy-slot-vert"></div>
            <div id="slot-1" class="energy-slot-vert"></div>
        </div>

        <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; align-items: center; z-index: 100;">
            <button id="pause-btn" onclick="togglePause()" style="background: transparent; border: 1px solid var(--neon-blue); color: #fff; width: 80px; height: 32px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem;">⏸ 일시중지</button>
            <button id="exit-btn" onclick="location.href='index.html'" style="display: none; background: transparent; border: 1px solid var(--neon-orange); color: #ffffff; width: 80px; height: 32px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem;">나가기</button>
            <button id="mute-toggle-btn" onclick="toggleMute()" style="background: transparent; border: none; font-size: 1.1rem; cursor: pointer; margin-left: 3px;">🔊</button>
        </div>
        
        <div class="header" style="margin-top: 55px;">
            <div id="session-tag" style="color:var(--neon-blue); font-weight:bold; font-size:1.1rem;"></div>
            <div class="progress-box"><div id="bar"></div></div>
        </div>
        
        <div id="display" style="margin-top: -90px;">
            <div id="target"></div>
            <div id="meanings"></div>
        </div>
        
        <div class="footer" style="display:none;"></div>
    </div>
 
    <script src="worddata.js"></script>
    <script>
        window.wordsData = typeof wordsData !== 'undefined' ? wordsData : { middle: {}, high: {} };
    </script>
    
    <script src="js/app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(err => console.log(err));
            });
        }
        window.addEventListener('DOMContentLoaded', () => {
            const targetEl = document.getElementById('target');
            if(targetEl) {
                const observer = new MutationObserver(() => {
                    const text = targetEl.innerText || "";
                    if (/[가-힣]/.test(text)) targetEl.classList.add('system-msg');
                    else targetEl.classList.remove('system-msg');
                });
                observer.observe(targetEl, { childList: true, characterData: true, subtree: true });
            }
        });
    </script>
</body>
</html>
