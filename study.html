<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - Training</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCmbV6AUnR+N00s78kCA+D+sL+uBqN8uV22OtzOqP9A1ofw3u8g+oZD+65aX2Q" crossorigin="anonymous"></script>
</head>
<body class="study-bg">
    <div id="app">
        <button class="back-btn" onclick="location.href='index.html'">← 대시보드로</button>
        
        <header class="header">
            <div id="session-tag">Session 1</div>
            <div class="progress-box"><div id="bar"></div></div>
        </header>

        <main id="display" class="mode-default">
            <div class="word-group">
                <h1 id="target">데이터 로딩 중...</h1> 
                <p id="ipa"></p>
            </div>
            <div id="meanings"></div>
        </main>

        <footer class="footer">
            <button id="main-action">훈련 시작</button>
        </footer>
    </div>
    <div class="card routine-section">
        <div class="routine-header">📅 7일 루틴 (80% 통과제)</div>
        <ul class="routine-list">
            <li class="routine-item"><span class="day-label">Day 1</span><button class="routine-action-btn active" onclick="location.href='study.html'">시작</button></li>
            <li class="routine-item"><span class="day-label">Day 2</span><button class="routine-action-btn" onclick="unlockDay(this, 2)">🔒 잠김</button></li>
            <li class="routine-item"><span class="day-label">Day 3</span><button class="routine-action-btn" onclick="unlockDay(this, 3)">🔒 잠김</button></li>
            <li class="routine-item"><span class="day-label">Day 4</span><button class="routine-action-btn" onclick="unlockDay(this, 4)">🔒 잠김</button></li>
        </ul>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <button onclick="localStorage.clear(); location.reload();" style="background: none; border: none; color: #555; text-decoration: underline; cursor: pointer; font-size: 0.9rem;">
            🔄 개발 테스트용: 모든 데이터 초기화
        </button>
    </div>

</div> <script src="wordData.js"></script>
<script>
    // ... 기존 스크립트 그대로 유지 ...
    <script src="wordData.js"></script>
    <script src="app.js"></script>
</body>
</html>
