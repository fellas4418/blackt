<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - Training</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCmbV6AUnR+N00s78kCA+D+sL+uBqN8uV22OtzOqP9A1ofw3u8g+oZD+65aX2Q" crossorigin="anonymous"></script>
    <style>
        #target {
            padding: 0 20px; 
            width: 100%; 
            box-sizing: border-box; 
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 3.5rem !important; 
            line-height: 1.2;
            text-align: center;
        }
        /* ★ 단어 뜻 50% 확대 */
        #meanings div {
            font-size: 2.6rem !important;
            font-weight: bold;
            margin-bottom: 20px !important;
            color: #fff;
            text-align: center;
        }
        /* ★ 4지선다 보기 크기 확대 */
        .choice-btn {
            font-size: 1.6rem !important;
            padding: 20px !important;
            font-weight: bold;
        }
        /* ★ 발음기호 선명하게 */
        .ipa-text {
            color: #ddd;
            font-size: 1.4rem;
            margin-top: 5px;
            font-weight: normal;
        }
    </style>
</head>
<body class="study-bg">
    <div id="app">
        
        <div style="position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 100;">
            <button id="pause-btn" class="back-btn" style="position: static;" onclick="togglePause()">⏸ 일시중지</button>
            <button id="exit-btn" class="back-btn" style="position: static; display: none; border-color: var(--neon-orange); color: var(--neon-orange);" onclick="location.href='index.html'">🚪 나가기</button>
        </div>
        
        <header class="header">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                <div id="session-tag">Session 1 / 6</div>
                <button id="mute-toggle-btn" onclick="toggleMute()" style="background:none; border:none; font-size:1.4rem; cursor:pointer; color:#fff;" title="자동 발음 켜기/끄기">🔊</button>
            </div>
            <div class="progress-box"><div id="bar"></div></div>
        </header>

        <main id="display" class="mode-default">
            <div class="word-group">
                <h1 id="target">데이터 로딩 중...</h1> 
            </div>
            <div id="meanings"></div>
        </main>

        <footer class="footer" style="display: none;">
            <button id="main-action">학습 시작</button>
        </footer>
    </div>
    
    <script src="wordData.js"></script>
    <script src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('학습 페이지: 서비스 워커 등록 성공!'))
                    .catch(err => console.log('학습 페이지: 서비스 워커 등록 실패:', err));
            });
        }
    </script>
</body>
</html>
