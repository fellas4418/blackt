<script src="worddata.js"></script>

    <script>
        // 💡 중요: worddata.js에서 가져온 데이터를 app.js가 문제없이 쓸 수 있도록 연결해 줍니다.
        window.wordsData = typeof wordsData !== 'undefined' ? wordsData : { middle: {}, high: {} };
    </script>

    <script src="app.js"></script>

    <script>
        // 서비스 워커 등록 (기존 코드 유지)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('학습 페이지: 서비스 워커 등록 성공!'))
                    .catch(err => console.log('학습 페이지: 서비스 워커 등록 실패:', err));
            });
        }

        // 한글 감지 및 스타일 변경 (기존 코드 유지)
        window.addEventListener('DOMContentLoaded', () => {
            const targetEl = document.getElementById('target');
            if(targetEl) {
                const observer = new MutationObserver(() => {
                    const text = targetEl.innerText || "";
                    if (/[가-힣]/.test(text)) {
                        targetEl.classList.add('system-msg');
                    } else {
                        targetEl.classList.remove('system-msg');
                    }
                });
                observer.observe(targetEl, { childList: true, characterData: true, subtree: true });
            }
        });
    </script>
