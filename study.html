<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIGGER BLACK · VOCA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cyber-theme.css">
    
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>

    <style>
        /* 납작한 세로형 에너지 슬롯 + 보라색(퍼플) 적용 */
        .energy-slot-vert { 
            width: 26px; 
            height: 6px; 
            background: #222; 
            border: 1px solid #333; 
            border-radius: 3px; 
            transition: all 0.3s ease; 
        }
        .energy-slot-vert.active { 
            background: var(--neon-blue); 
            box-shadow: 0 0 10px var(--neon-blue); 
            border-color: #fff; 
        }
        /* 학습 화면: 단어·뜻을 위로 당김 (테스트는 겹침 방지로 미적용) */
        #display {
            margin-top: -90px;
        }
        /* 테스트(4지선다): 숫자 — 영단어 — 보기, 위·아래 여백 동일 */
        .header.test-phase-header {
            padding-bottom: 0;
        }
        .header.test-phase-header #session-counter {
            margin-top: 10px !important;
            margin-bottom: 0 !important;
        }
        #display.test-phase {
            margin-top: 0 !important;
            justify-content: flex-start;
            padding-top: 24px;
            box-sizing: border-box;
        }
        #display.test-phase #target {
            margin-top: 0 !important;
            margin-bottom: 24px !important;
            flex-shrink: 0;
        }
        #display.test-phase #meanings {
            width: 90%;
            margin-top: 0 !important;
            flex-shrink: 0;
        }
        #display.test-phase #meanings .choice-btn:first-child {
            margin-top: 0 !important;
        }
        @media print {
            body { background: #fff !important; }
            #app, .back-btn, button { display: none !important; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; padding: 20px; background: #fff; color: #000; }
            .page-break { page-break-before: always; }
        }
    </style>
</head>
<body class="study-bg">
    <div id="app">
        <button id="main-back-btn" class="back-btn" onclick="location.href='index.html'">← 메인으로</button>
        
        <div style="position: absolute; top: 65px; left: 20px; display: flex; flex-direction: column; gap: 5px; align-items: center; z-index: 100;">
            <div class="charge-label" style="font-size: 0.65rem; color: #666; font-weight: bold; margin-bottom: 2px;">CHARGE</div>
            <div id="slot-2" class="energy-slot-vert"></div>
            <div id="slot-1" class="energy-slot-vert"></div>
        </div>

        <button type="button" class="trigger-credit-chip--study" onclick="typeof TriggerCredit!=='undefined'&&TriggerCredit.showCreditInfo()" title="트리거 크레딧">
            <span class="header-credit-label">credit</span>
            <span class="header-credit-value" id="trigger-credit-value-study">0</span>
        </button>
        <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; align-items: center; z-index: 100;">
            <button id="pause-btn" onclick="togglePause()" style="background: transparent; border: 1px solid var(--neon-blue); color: #fff; width: 80px; height: 32px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem;">⏸ 일시중지</button>
            <button id="exit-btn" onclick="location.href='index.html'" style="display: none; background: transparent; border: 1px solid var(--neon-orange); color: #ffffff; width: 80px; height: 32px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem;">나가기</button>
            <button id="mute-toggle-btn" onclick="toggleMute()" style="background: transparent; border: none; font-size: 1.1rem; cursor: pointer; margin-left: 3px;">🔊</button>
        </div>
        
        <div class="header" style="margin-top: 55px;">
            <div id="session-tag" style="color:var(--neon-blue); font-weight:bold; font-size:1.1rem;"></div>
            <div class="progress-box"><div id="bar"></div></div>
        </div>
        
        <div id="display">
            <div id="target"></div>
            <div id="meanings"></div>
        </div>
        
        <div class="footer" style="display:none;"></div>
    </div>

    <div id="print-area" style="display:none; padding:20px; background:#fff; color:#000;"></div>
 
    <script src="worddata.js"></script>
    <script>
        window.wordsData = typeof wordsData !== 'undefined' ? wordsData : { middle: {}, high: {} };
    </script>
    
    <script src="trigger-credit.js?v=20260526"></script>
    <script src="trigger-voca-pdf.js?v=20260526"></script>
    <script src="praise-share.js?v=20260517_kakao2"></script>
    <script src="app.js?v=20260526_credit_pdf"></script> 
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').then(reg => {
                    // 서비스 워커 강제 업데이트 체크
                    reg.update();
                }).catch(err => console.log(err));
            });
        }
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof TriggerCredit !== 'undefined') TriggerCredit.updateDisplay();
            const targetEl = document.getElementById('target');
            if(targetEl) {
                const observer = new MutationObserver(() => {
                    const text = targetEl.innerText || "";
                    if (/[가-힣]/.test(text)) targetEl.classList.add('system-msg');
                    else targetEl.classList.remove('system-msg');
                });
                observer.observe(targetEl, { childList: true, characterData: true, subtree: true });
            }
        });
    </script>
</body>
</html>
