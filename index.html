<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>blackt V4.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div id="session-tag">Session 1</div>
            <div class="progress-box"><div id="bar"></div></div>
            <div id="timer-text">05s</div>
        </header>

        <main id="display" class="mode-default">
            <div class="word-group">
                <h1 id="target">Ready?</h1>
                <p id="ipa"></p>
            </div>
            <div id="meanings"></div>
        </main>

        <footer class="footer">
            <button id="main-action">훈련 시작</button>
        </footer>
    </div>
    <script src="wordData.js"></script>
    <script src="app.js"></script>
</body>
</html>
