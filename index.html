<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - Neon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        #login-modal, #wrong-modal, #all-words-modal, #report-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.5s; }
        .login-card { background: var(--card-bg-color); border: 1px solid var(--neon-blue); box-shadow: var(--glow-blue); border-radius: 20px; padding: 30px; width: 85%; max-width: 400px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .login-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; text-shadow: var(--glow-text); }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-label { font-size: 0.9rem; color: #888; margin-bottom: 5px; display: block; }
        .neon-input { width: 100%; box-sizing: border-box; padding: 12px; background: #000; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 1rem; transition: 0.3s; }
        .neon-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,243,255,0.3); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 15px 0 5px 0; font-size: 0.9rem; color: #aaa; text-align: left; }
        .login-btn { width: 100%; padding: 15px; background: transparent; border: 2px solid var(--neon-green); color: #fff; font-size: 1.1rem; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: var(--glow-green); margin-top: 10px;}
        #welcome-msg { text-align: center; color: var(--neon-blue); font-size: 1.1rem; margin-bottom: 5px; text-shadow: 0 0 5px var(--neon-blue); }
        #streak-msg { text-align: center; color: var(--neon-orange); font-size: 1rem; font-weight: bold; margin-bottom: 15px; }
        .clickable-card { cursor: pointer; transition: 0.2s; }
        .clickable-card:active { transform: scale(0.95); }
        
        .stats-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .stat-item { text-align: center; flex: 1; }
        .stat-label { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--neon-blue); }
        
        .report-bar-bg { width: 100%; background: #222; height: 12px; border-radius: 6px; margin-top: 5px; overflow: hidden; }
        .report-bar-fill { height: 100%; background: var(--neon-green); width: 0%; border-radius: 6px; box-shadow: 0 0 5px var(--neon-green); transition: width 0.5s; }

        .routine-scroll-box { max-height: 350px; overflow-y: auto; border: 1px solid #333; border-radius: 10px; padding: 10px; background: rgba(0,0,0,0.3); }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; color: #000; background: #fff; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; font-family: sans-serif; }
            .print-day { font-size: 1.5rem; font-weight: bold; margin-top: 20px; border-bottom: 2px solid #000; padding-bottom: 5px; }
            .print-word { font-size: 1.2rem; font-weight: bold; margin-top: 10px; }
            .print-meaning { font-size: 1rem; color: #333; margin-bottom: 5px; }
        }
    </style>
</head>
<body class="dashboard-bg">
    
    <div id="print-area" style="display:none;"></div>

    <div id="login-modal" style="display:none;">
        <div class="login-card">
            <div class="login-title">Trigger Voca</div>
            <div class="input-group"><span class="input-label">이름 (실명)</span><input type="text" id="user-name" class="neon-input"></div>
            <div class="input-group">
                <span class="input-label">전화번호 (선택)</span>
                <input type="tel" id="user-phone" class="neon-input" placeholder="010-0000-0000">
                <span style="font-size: 0.8rem; color: var(--neon-orange); margin-top:5px; display:block;">* 할인 및 혜택 알림 목적으로만 사용됩니다.</span>
            </div>
            <div class="checkbox-group"><input type="checkbox" id="agree-privacy"><label for="agree-privacy">개인정보 수집 동의</label></div>
            <button class="login-btn" onclick="handleLogin()">시작하기</button>
        </div>
    </div>

    <div id="wrong-modal" style="display:none; z-index: 2000;">
        <div class="login-card" style="border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green);">
            <div class="login-title" style="color:var(--neon-green); text-shadow: 0 0 10px var(--neon-green);">오답 / 별표</div>
            <div id="wrong-list" style="text-align:left; color:#fff; margin-bottom:20px; font-size:1.1rem; line-height:1.8;"></div>
            <button class="login-btn" onclick="document.getElementById('wrong-modal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="all-words-modal" style="display:none; z-index: 2000;">
        <div class="login-card" style="border-color: var(--neon-orange); box-shadow: 0 0 15px var(--neon-orange); width: 90%; max-width: 450px;">
            <div class="login-title" style="color:var(--neon-orange); text-shadow: 0 0 10px var(--neon-orange);">전체 단어장 보기</div>
            <div id="all-words-list" style="text-align:left; color:#fff; margin-bottom:20px; line-height:1.6; max-height: 55vh; overflow-y: auto; padding-right: 10px;"></div>
            <button class="login-btn" style="border-color: var(--neon-orange); box-shadow: 0 0 10px var(--neon-orange);" onclick="document.getElementById('all-words-modal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="report-modal" style="display:none; z-index: 2000;">
        <div class="login-card" style="border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); width: 90%; max-width: 450px;">
            <div class="login-title" style="color:var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);">나의 학습 기록 보기</div>
            <div id="report-list" style="text-align:left; color:#fff; margin-bottom:20px; font-size:1rem; line-height:1.8; max-height: 55vh; overflow-y: auto; padding-right:10px;"></div>
            <button class="login-btn" style="border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue);" onclick="document.getElementById('report-modal').style.display='none'">닫기</button>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="logo">Trigger<br>Voca</div>
        <div id="welcome-msg"></div>
        <div id="streak-msg"></div>

        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">진행 중인 Day</div>
                <div class="stat-value" id="stat-current-day">Day 1</div>
            </div>
            <div class="stat-item" style="border-left: 1px solid #444; border-right: 1px solid #444;">
                <div class="stat-label">오늘의 세션</div>
                <div class="stat-value" id="stat-session">1 / 6</div>
            </div>
            <div class="stat-item clickable-card" onclick="showWeeklyReport()">
                <div class="stat-label">누적 리포트</div>
                <div class="stat-value" style="color:var(--neon-green); text-decoration:underline;">보기 📊</div>
            </div>
        </div>

        <div class="card level-section">
            <div class="level-title">학습 레벨 선택</div>
            <div class="level-buttons">
                <button class="level-btn active" id="btn-middle" onclick="selectLevel('middle')">📚 중등단어</button>
                <button class="level-btn" id="btn-high" onclick="selectLevel('high')">🎓 고등단어</button>
            </div>
        </div>

        <div class="card study-section">
            <div class="map-icon">🗺️</div>
            <div class="study-title">오늘의 학습</div>
            <div class="target-words">목표 단어: <span class="target-count" id="target-count-display">0개</span></div>
            <button class="start-btn" id="start-btn-main">학습 시작하기</button>
        </div>

        <div class="info-row">
            <div class="card info-card clickable-card" onclick="showAllWords()">
                <div class="info-title title-orange">전체 단어장 보기</div>
                <div class="info-count" id="total-word-count">0 단어</div>
            </div>
            <div class="card info-card clickable-card" onclick="showWrongWords()">
                <div class="info-title title-green">오답/별표 단어 보기</div>
                <div class="info-count" id="wrong-word-count">0 단어</div>
            </div>
        </div>

        <div class="card routine-section">
            <div class="routine-header">📅 42일 루틴 (학습 + 복습)</div>
            <div class="routine-scroll-box">
                <ul class="routine-list" id="routine-list-container"></ul>
            </div>
            
            <div id="pdf-download-section" style="margin-top: 15px; text-align: center; border-top: 1px dashed #555; padding-top: 15px;">
                <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 10px; line-height: 1.5;">🔒 7일 치 완료 시 전체 단어 파일(PDF)이<br>잠금 해제됩니다.</p>
                <button id="pdf-btn" disabled style="background: #333; color: #666; border: 1px solid #555; padding: 10px 20px; border-radius: 8px; cursor: not-allowed; font-weight: bold;">
                    다운로드 잠김
                </button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px; display: flex; flex-direction: column; gap: 12px; align-items: center;">
            <button onclick="localStorage.setItem('trigger_session', '3'); localStorage.removeItem('blackt_cooldown'); location.reload();" style="background: none; border: none; color: var(--neon-blue); text-decoration: underline; cursor: pointer; font-size: 0.95rem; font-weight: bold;">
                ⏩ 3세션으로 강제 스킵
            </button>
            <button onclick="localStorage.setItem('trigger_session', '6'); localStorage.removeItem('blackt_cooldown'); location.reload();" style="background: none; border: none; color: var(--neon-orange); text-decoration: underline; cursor: pointer; font-size: 0.95rem; font-weight: bold;">
                ⏩ 6세션으로 강제 스킵
            </button>
            <button onclick="localStorage.clear(); location.reload();" style="background: none; border: none; color: #555; text-decoration: underline; cursor: pointer; font-size: 0.85rem;">
                🔄 모든 데이터 완전 초기화
            </button>
        </div>

    </div>

    <script src="wordData.js"></script>
    <script>
        const todayStr = new Date().toLocaleDateString();
        if (localStorage.getItem('trigger_date') !== todayStr) {
            localStorage.setItem('trigger_date', todayStr);
            localStorage.setItem('trigger_session', '1');
            localStorage.setItem('trigger_unlocked_extra_today', '0'); 
        }

        function startDayStudy(day) {
            const savedDay = parseInt(localStorage.getItem('trigger_current_day')) || 1;
            if (savedDay !== day) {
                localStorage.setItem('trigger_session', '1'); 
            }
            localStorage.setItem('trigger_current_day', day);
            location.href = 'study.html';
        }

        function renderRoutine() {
            let unlockedDay = parseInt(localStorage.getItem('trigger_unlocked_day')) || 1;
            const container = document.getElementById('routine-list-container');
            if (!container) return;
            
            let html = '';
            for(let i=1; i<=42; i++) {
                let isReview = (i % 7 === 6 || i % 7 === 0);
                let dayLabel = isReview ? `Day ${i} (복습)` : `Day ${i}`;
                
                if (i < unlockedDay) {
                    html += `<li class="routine-item"><span class="day-label">${dayLabel}</span><button class="routine-action-btn" style="border-color:#444; color:#aaa;" onclick="startDayStudy(${i})">완료</button></li>`;
                } else if (i === unlockedDay) {
                    html += `<li class="routine-item"><span class="day-label">${dayLabel}</span><button class="routine-action-btn active" onclick="startDayStudy(${i})">시작</button></li>`;
                } else {
                    html += `<li class="routine-item"><span class="day-label">${dayLabel}</span><button class="routine-action-btn" onclick="unlockDay(this, ${i})">🔒 잠김</button></li>`;
                }
            }
            container.innerHTML = html;

            const pdfBtn = document.getElementById('pdf-btn');
            if (unlockedDay > 7) {
                pdfBtn.disabled = false;
                pdfBtn.innerText = "📥 누적 단어장 다운로드 (인쇄/PDF)";
                pdfBtn.style.background = "transparent";
                pdfBtn.style.color = "var(--neon-green)";
                pdfBtn.style.borderColor = "var(--neon-green)";
                pdfBtn.style.boxShadow = "var(--glow-green)";
                pdfBtn.style.cursor = "pointer";
                pdfBtn.onclick = generatePDF;
            }
        }

        function generatePDF() {
            const unlockedDay = parseInt(localStorage.getItem('trigger_unlocked_day')) || 1;
            const currentLevel = localStorage.getItem('trigger_level') || 'middle';
            const levelData = wordsData[currentLevel] || {};
            
            let printHtml = `<h1 style="text-align:center;">Trigger Voca 누적 단어장 (${currentLevel === 'middle' ? '중등' : '고등'})</h1>`;
            
            for(let i=1; i < unlockedDay; i++) {
                if (i % 7 === 6 || i % 7 === 0) continue; 
                const dayWords = levelData[i] || [];
                if(dayWords.length > 0) {
                    printHtml += `<div class="print-day">Day ${i}</div>`;
                    dayWords.forEach(w => {
                        printHtml += `<div class="print-word">${w.word} <span style="color:#666; font-size:0.9rem;">${w.ipa}</span></div>`;
                        printHtml += `<div class="print-meaning">${w.meanings.join(', ')}</div>`;
                    });
                }
            }
            
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = printHtml;
            printArea.style.display = 'block'; 
            window.print(); 
            printArea.style.display = 'none'; 
        }

        function showWrongWords() {
            const currentLevel = localStorage.getItem('trigger_level') || 'middle';
            let wrongWords = JSON.parse(localStorage.getItem('trigger_wrong_words') || '[]');
            wrongWords = wrongWords.filter(w => w.level === currentLevel); 
            
            const listContainer = document.getElementById('wrong-list');
            if(wrongWords.length === 0) {
                listContainer.innerHTML = "<p style='text-align:center; color:#888;'>해당 레벨의 오답이 없습니다.</p>";
            } else {
                listContainer.innerHTML = wrongWords.map(w => `<div style="padding:10px 0; border-bottom:1px solid #333;"><strong>${w.word}</strong> <span style="color:#888; font-size:0.9rem;">${w.meanings.join(', ')}</span></div>`).join('');
            }
            document.getElementById('wrong-modal').style.display = 'flex';
        }

        function showAllWords() {
            const unlockedDay = parseInt(localStorage.getItem('trigger_unlocked_day')) || 1;
            let learnedWordsHtml = '';
            let totalCount = 0;

            const renderLevelWords = (levelKey, levelName) => {
                const levelData = wordsData[levelKey] || {};
                let levelHtml = '';
                let levelCount = 0;
                
                for(let i = 1; i < unlockedDay; i++) {
                    if (i % 7 === 6 || i % 7 === 0) continue; 
                    const dayWords = levelData[i] || [];
                    if(dayWords.length > 0) {
                        dayWords.forEach(w => {
                            levelCount++;
                            levelHtml += `<div style="padding:12px 0; border-bottom:1px solid #333;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                    <strong style="font-size:1.1rem;">${w.word}</strong>
                                    <span style="color:var(--neon-blue); font-size:0.8rem; border:1px solid var(--neon-blue); border-radius:10px; padding:2px 8px;">Day ${i}</span>
                                </div>
                                <span style="color:#aaa; font-size:0.85rem;">${w.ipa}</span><br>
                                <span style="color:#888; font-size:0.95rem; display:inline-block; margin-top:3px;">${w.meanings.join(', ')}</span>
                            </div>`;
                        });
                    }
                }
                
                if (levelCount > 0) {
                    totalCount += levelCount;
                    return `<div style="margin-top:20px; margin-bottom:10px; font-size:1.2rem; font-weight:bold; color:var(--neon-orange); border-bottom:2px solid var(--neon-orange); padding-bottom:5px; text-align:left;">[${levelName}]</div>` + levelHtml;
                }
                return '';
            };

            learnedWordsHtml += renderLevelWords('middle', '📚 중등 단어');
            learnedWordsHtml += renderLevelWords('high', '🎓 고등 단어');
            
            const listContainer = document.getElementById('all-words-list');
            if(totalCount === 0) {
                listContainer.innerHTML = "<p style='text-align:center; color:#888; margin-top:20px;'>아직 학습을 완료한 단어가 없습니다.<br>진도를 먼저 나가주세요!</p>";
            } else {
                listContainer.innerHTML = learnedWordsHtml;
            }
            
            document.getElementById('total-word-count').innerText = totalCount + " 단어";
            document.getElementById('all-words-modal').style.display = 'flex';
        }

        // ★ 누적 리포트 시각화 - 진행률(세션수) 명확히 추가
        function showWeeklyReport() {
            const stats = JSON.parse(localStorage.getItem('trigger_stats') || '{}');
            const listContainer = document.getElementById('report-list');
            
            let html = '';
            for(let i=1; i<=42; i++) {
                let isReview = (i % 7 === 6 || i % 7 === 0);
                let dayLabel = isReview ? `Day ${i} (복습)` : `Day ${i}`;
                let dayStat = stats[i];
                
                if (typeof dayStat === 'number') {
                    dayStat = { progress: 6, accuracy: dayStat };
                }

                if(dayStat && dayStat.progress >= 6) {
                    let accuracy = dayStat.accuracy || 0;
                    let color = accuracy >= 80 ? "var(--neon-green)" : "var(--neon-orange)";
                    html += `
                        <div style="margin-bottom: 18px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <span>${dayLabel} <strong style="color:var(--neon-green);">6/6 세션 완료</strong></span>
                                <span style="color:${color}; font-weight:bold; font-size:0.9rem;">${isReview ? '복습 완료' : `정답률 ${accuracy}%`}</span>
                            </div>
                            <div class="report-bar-bg"><div class="report-bar-fill" style="width: 100%; background:${color}; box-shadow: 0 0 5px ${color};"></div></div>
                        </div>
                    `;
                } 
                else if (dayStat && dayStat.progress > 0 && !isReview) {
                    let progPercent = Math.floor((dayStat.progress / 6) * 100);
                    html += `
                        <div style="margin-bottom: 18px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <span>${dayLabel} <strong style="color:var(--neon-blue);">${dayStat.progress}/6 세션 진행 중</strong></span>
                                <span style="color:#aaa; font-size:0.85rem;">진행률 ${progPercent}%</span>
                            </div>
                            <div class="report-bar-bg"><div class="report-bar-fill" style="width: ${progPercent}%; background:var(--neon-blue); box-shadow: 0 0 5px var(--neon-blue);"></div></div>
                        </div>
                    `;
                } 
                else {
                    html += `
                        <div style="margin-bottom: 18px; opacity: 0.4;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <span>${dayLabel} <strong style="color:#666;">미진행</strong></span>
                                <span>-</span>
                            </div>
                            <div class="report-bar-bg"></div>
                        </div>
                    `;
                }
            }
            listContainer.innerHTML = html;
            document.getElementById('report-modal').style.display = 'flex';
        }

        function unlockDay(btn, day) {
            let unlockedExtra = parseInt(localStorage.getItem('trigger_unlocked_extra_today')) || 0;
            let currentUnlockedDay = parseInt(localStorage.getItem('trigger_unlocked_day')) || 1;
            
            if (day > currentUnlockedDay + 1) {
                alert("🚨 진도를 건너뛰고 열 수는 없습니다. 순서대로 완료해 주세요.");
                return;
            }
            
            if (unlockedExtra >= 1) {
                alert("🚨 장기 기억 보호를 위해 추가 진도는 하루에 1개 Day만 더 열 수 있습니다.\n내일 다시 시도해 주세요!");
                return;
            }

            if(confirm(`Day ${day}의 잠금을 해제하시겠습니까? (하루 1회 제한)`)) {
                localStorage.setItem('trigger_unlocked_day', day);
                localStorage.setItem('trigger_unlocked_extra_today', unlockedExtra + 1);
                renderRoutine();
                updateDashboardUI(); 
            }
        }

        function updateDashboardUI() {
            const currentLevel = localStorage.getItem('trigger_level') || 'middle';
            let wrongWords = JSON.parse(localStorage.getItem('trigger_wrong_words') || '[]');
            wrongWords = wrongWords.filter(w => w.level === currentLevel);
            document.getElementById('wrong-word-count').innerText = wrongWords.length + " 단어";

            const endTime = parseInt(localStorage.getItem('blackt_cooldown')) || 0;
            const startBtn = document.getElementById('start-btn-main');
            const currentSession = parseInt(localStorage.getItem('trigger_session')) || 1;
            const unlockedDay = parseInt(localStorage.getItem('trigger_unlocked_day')) || 1;
            const currentDay = parseInt(localStorage.getItem('trigger_current_day')) || 1;
            
            document.getElementById('stat-current-day').innerText = `Day ${currentDay}`;
            document.getElementById('stat-session').innerText = currentSession > 6 ? '학습 완료' : `${currentSession} / 6`;
            
            let streak = parseInt(localStorage.getItem('trigger_streak')) || 0;
            document.getElementById('streak-msg').innerText = streak > 0 ? `🔥 연속 ${streak}일째 학습 중!` : "🔥 오늘부터 1일 차 시작!";

            if (window.cooldownInterval) clearInterval(window.cooldownInterval);

            if (currentSession > 6) {
                startBtn.disabled = false;
                startBtn.innerText = "추가 복습하기 (자유 학습)";
                startBtn.style.borderColor = "var(--neon-blue)";
                startBtn.style.boxShadow = "var(--glow-blue)";
                startBtn.style.color = "#fff";
                startBtn.onclick = () => startDayStudy(unlockedDay);
            } else if (endTime && endTime - Date.now() > 0) {
                
                startBtn.disabled = true; 
                startBtn.style.borderColor = "#444";
                startBtn.style.boxShadow = "none";
                startBtn.style.color = "#666";
                startBtn.onclick = null; 
                
                const updateTimerText = () => {
                    const remaining = endTime - Date.now();
                    if (remaining <= 0) {
                        clearInterval(window.cooldownInterval);
                        localStorage.removeItem('blackt_cooldown');
                        startBtn.disabled = false;
                        startBtn.innerText = "학습 시작하기";
                        startBtn.style.borderColor = "var(--neon-orange)";
                        startBtn.style.boxShadow = "var(--glow-orange)";
                        startBtn.style.color = "#fff";
                        startBtn.onclick = () => startDayStudy(unlockedDay);
                    } else {
                        const mins = Math.floor(remaining / 60000);
                        const secs = Math.floor((remaining % 60000) / 1000);
                        startBtn.innerText = `쉬고 있어요 🔒 (${mins}:${secs < 10 ? '0' : ''}${secs})`;
                    }
                };
                
                updateTimerText();
                window.cooldownInterval = setInterval(updateTimerText, 1000);
                
            } else {
                startBtn.disabled = false;
                startBtn.innerText = "학습 시작하기";
                startBtn.style.borderColor = "var(--neon-orange)";
                startBtn.style.boxShadow = "var(--glow-orange)";
                startBtn.style.color = "#fff";
                startBtn.onclick = () => startDayStudy(unlockedDay);
            }
            renderRoutine();
        }

        function handleLogin() {
            const name = document.getElementById('user-name').value.trim();
            const phone = document.getElementById('user-phone').value.trim();
            const agree = document.getElementById('agree-privacy').checked;
            
            if (!name) return alert("이름을 입력해주세요.");
            if (!agree) return alert("개인정보 수집에 동의하셔야 합니다.");
            
            if (phone) {
                const phoneRegex = /^01([0|1|6|7|8|9]?)-?([0-9]{3,4})-?([0-9]{4})$/;
                if (!phoneRegex.test(phone)) {
                    return alert("올바른 전화번호 형식(010-0000-0000)으로 입력해 주세요.");
                }
            }
            
            localStorage.setItem('trigger_name', name);
            checkLoginStatus(); 
        }

        function checkLoginStatus() {
            const savedName = localStorage.getItem('trigger_name');
            const currentSession = parseInt(localStorage.getItem('trigger_session')) || 1;
            const modal = document.getElementById('login-modal');
            const welcomeMsg = document.getElementById('welcome-msg');

            if (savedName) {
                modal.style.display = 'none';
                welcomeMsg.innerText = currentSession > 6 
                    ? `환영합니다, ${savedName}님! (오늘 목표 완료!)` 
                    : `환영합니다, ${savedName}님!`;
            } else {
                modal.style.display = 'flex';
            }
            updateDashboardUI();
        }

        function selectLevel(level) {
            localStorage.setItem('trigger_level', level);
            document.getElementById('btn-middle').className = "level-btn";
            document.getElementById('btn-high').className = "level-btn";
            document.getElementById('btn-' + level).className = "level-btn active";

            if (typeof wordsData !== 'undefined') {
                const unlockedDay = parseInt(localStorage.getItem('trigger_unlocked_day')) || 1;
                
                let totalCount = 0;
                for(let l of ['middle', 'high']) {
                    const lData = wordsData[l] || {};
                    for(let i = 1; i < unlockedDay; i++) {
                        if (i % 7 === 6 || i % 7 === 0) continue;
                        totalCount += (lData[i] || []).length;
                    }
                }
                document.getElementById('total-word-count').innerText = totalCount + " 단어";
                
                const levelData = wordsData[level] || {};
                const currentDay = parseInt(localStorage.getItem('trigger_current_day')) || 1;
                const todayCount = (levelData[currentDay] || []).length;
                document.getElementById('target-count-display').innerText = todayCount + "개";
            }
            updateDashboardUI();
        }

        window.onload = function() {
            checkLoginStatus();
            selectLevel(localStorage.getItem('trigger_level') || 'middle');
        }
    </script>

<script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('서비스 워커 등록 성공!', reg))
          .catch(err => console.log('서비스 워커 등록 실패:', err));
      });
    }
  </script>
