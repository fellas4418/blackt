<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - Neon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-bg">
    <div class="dashboard-container">
        <div class="logo">Trigger<br>Voca</div>

        <div class="card level-section">
            <div class="level-title">학습 레벨 선택</div>
            <div class="level-buttons">
                <button class="level-btn active" id="btn-middle" onclick="selectLevel('middle')">📚 중등단어</button>
                <button class="level-btn" id="btn-high" onclick="selectLevel('high')">🎓 고등단어</button>
            </div>
        </div>

        <div class="card study-section">
            <div class="map-icon">🗺️</div>
            <div class="study-title">오늘의 학습</div>
            <div class="target-words">목표 단어: <span class="target-count" id="target-count-display">0개</span></div>
            <button class="start-btn" onclick="location.href='study.html'">학습 시작하기</button>
        </div>

        <div class="info-row">
            <div class="card info-card">
                <div class="info-title title-orange">내 단어장</div>
                <div class="info-count" id="total-word-count">0 단어</div>
            </div>
            <div class="card info-card">
                <div class="info-title title-green">오답/별표</div>
                <div class="info-count">0 단어</div>
            </div>
        </div>

        <div class="card routine-section">
            <div class="routine-header">📅 7일 루틴 (80% 통과제)</div>
            <ul class="routine-list">
                <li class="routine-item"><span class="day-label">Day 1</span><button class="routine-action-btn active" onclick="location.href='study.html'">시작</button></li>
                <li class="routine-item"><span class="day-label">Day 2</span><button class="routine-action-btn">🔒 잠김</button></li>
                <li class="routine-item"><span class="day-label">Day 3</span><button class="routine-action-btn">🔒 잠김</button></li>
                <li class="routine-item"><span class="day-label">Day 4</span><button class="routine-action-btn">🔒 잠김</button></li>
            </ul>
        </div>
    </div>

    <script src="wordData.js"></script>
    <script>
        // 기본값은 중등단어로 설정
        let currentLevel = localStorage.getItem('trigger_level') || 'middle';
        
        function selectLevel(level) {
            currentLevel = level;
            localStorage.setItem('trigger_level', level); // 선택한 레벨 브라우저에 저장
            
            // 버튼 활성화 UI 변경 (디자인 자체는 안 건드림)
            document.getElementById('btn-middle').classList.toggle('active', level === 'middle');
            document.getElementById('btn-high').classList.toggle('active', level === 'high');
            
            // 선택한 레벨에 맞춰 단어 개수 자동 업데이트
            const count = wordsData[level].length;
            document.getElementById('total-word-count').innerText = count + " 단어";
            document.getElementById('target-count-display').innerText = count + "개";
        }
        
        // 페이지 로드 시 마지막으로 누른 버튼 상태 유지
        selectLevel(currentLevel);
    </script>
</body>
</html>
