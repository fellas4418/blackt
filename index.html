<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - Neon Edition</title>
    <style>
        :root {
            --bg-color: #050505; /* 아주 어두운 검은색 배경 */
            --card-bg-color: #111; /* 약간 밝은 검은색 카드 */
            --border-color: #333; /* 어두운 회색 테두리 */
            
            /* 네온 포인트 컬러 */
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-orange: #ff6700;
            --neon-pink: #ff0055;
            --neon-purple: #bc13fe;
            
            /* 텍스트 컬러 */
            --text-main: #fff;
            --text-muted: #888;
            
            /* 네온 글로우 효과 정의 */
            --glow-blue: 0 0 10px rgba(0, 243, 255, 0.7), 0 0 20px rgba(0, 243, 255, 0.5);
            --glow-green: 0 0 10px rgba(57, 255, 20, 0.7);
            --glow-orange: 0 0 15px rgba(255, 103, 0, 0.8);
            --glow-text: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--neon-blue);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* 메인 컨테이너 */
        .dashboard-container {
            width: 100%;
            max-width: 480px; /* 모바일 퍼스트 레이아웃 */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 로고 스타일 */
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: var(--glow-text); /* 메인 로고에 네온 글로우 적용 */
        }

        /* 공통 카드 스타일 (둥근 모서리, 배경색, 테두리) */
        .card {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* 1. 학습 레벨 선택 섹션 */
        .level-section {
            padding: 20px;
        }

        .level-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .level-buttons {
            display: flex;
            gap: 15px;
        }

        .level-btn {
            flex: 1;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        /* 선택된 버튼 네온 스타일 */
        .level-btn.active {
            border-color: var(--neon-blue);
            color: #fff;
            box-shadow: var(--glow-blue); /* 파란색 네온 글로우 */
        }

        /* 2. 오늘의 학습 섹션 */
        .study-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .map-icon {
            font-size: 2rem;
            color: var(--neon-purple);
            text-shadow: 0 0 10px var(--neon-purple); /* 보라색 네온 글로우 */
        }

        .study-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .target-words {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .target-count {
            color: #fff;
            font-weight: 700;
        }

        /* 학습 시작하기 버튼 네온 스타일 */
        .start-btn {
            width: 100%;
            background-color: transparent;
            border: 2px solid var(--neon-orange);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 18px;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: var(--glow-orange); /* 주황색 네온 글로우 */
        }

        /* 3. 단어장 정보 섹션 (2열 레이아웃) */
        .info-row {
            display: flex;
            gap: 15px;
        }

        .info-card {
            flex: 1;
            text-align: center;
            padding: 20px;
        }

        .info-title {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .title-orange { color: var(--neon-orange); }
        .title-green { color: var(--neon-green); }

        .info-count {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        /* 4. 7일 루틴 섹션 */
        .routine-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        .routine-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .routine-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .routine-item:last-child {
            border-bottom: none;
        }

        .day-label {
            color: #fff;
            font-size: 1rem;
        }

        /* 루틴 버튼 스타일 */
        .routine-action-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* 활성화된 '시작' 버튼 네온 스타일 */
        .routine-action-btn.active {
            border-color: var(--neon-green);
            color: #fff;
            box-shadow: var(--glow-green); /* 초록색 네온 글로우 */
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="logo">Trigger<br>Voca</div>

        <div class="card level-section">
            <div class="level-title">학습 레벨 선택</div>
            <div class="level-buttons">
                <button class="level-btn active">📚 중등 기초</button>
                <button class="level-btn">🎓 고등 심화</button>
            </div>
        </div>

        <div class="card study-section">
            <div class="map-icon">🗺️</div>
            <div class="study-title">오늘의 학습</div>
            <div class="target-words">목표 단어: <span class="target-count">25개</span></div>
            <button class="start-btn">학습 시작하기</button>
        </div>

        <div class="info-row">
            <div class="card info-card">
                <div class="info-title title-orange">내 단어장</div>
                <div class="info-count">175 단어</div>
            </div>
            <div class="card info-card">
                <div class="info-title title-green">오답/별표</div>
                <div class="info-count">0 단어</div>
            </div>
        </div>

        <div class="card routine-section">
            <div class="routine-header">📅 7일 루틴 (80% 통과제)</div>
            <ul class="routine-list">
                <li class="routine-item">
                    <span class="day-label">Day 1</span>
                    <button class="routine-action-btn active">시작</button>
                </li>
                <li class="routine-item">
                    <span class="day-label">Day 2</span>
                    <button class="routine-action-btn">🔒 잠김</button>
                </li>
                <li class="routine-item">
                    <span class="day-label">Day 3</span>
                    <button class="routine-action-btn">🔒 잠김</button>
                </li>
                <li class="routine-item">
                    <span class="day-label">Day 4</span>
                    <button class="routine-action-btn">🔒 잠김</button>
                </li>
                <li class="routine-item">
                    <span class="day-label">Day 5</span>
                    <button class="routine-action-btn">🔒 잠김</button>
                </li>
                <li class="routine-item">
                    <span class="day-label">Day 6</span>
                    <button class="routine-action-btn">🔒 잠김</button>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
