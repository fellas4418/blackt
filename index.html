<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - Neon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-bg">
    <div class="dashboard-container">
        <div class="logo">Trigger<br>Voca</div>

        <div class="card level-section">
            <div class="level-title">학습 레벨 선택</div>
            <div class="level-buttons">
                <button class="level-btn active">📚 중등 기초</button>
                <button class="level-btn">🎓 고등 심화</button>
            </div>
        </div>

        <div class="card study-section">
            <div class="map-icon">🗺️</div>
            <div class="study-title">오늘의 학습</div>
            <div class="target-words">목표 단어: <span class="target-count">25개</span></div>
            <button class="start-btn" onclick="location.href='study.html'">학습 시작하기</button>
        </div>

        <div class="info-row">
            <div class="card info-card">
                <div class="info-title title-orange">내 단어장</div>
                <div class="info-count">175 단어</div>
            </div>
            <div class="card info-card">
                <div class="info-title title-green">오답/별표</div>
                <div class="info-count">0 단어</div>
            </div>
        </div>

        <div class="card routine-section">
            <div class="routine-header">📅 7일 루틴 (80% 통과제)</div>
            <ul class="routine-list">
                <li class="routine-item">
                    <span class="day-label">Day 1</span>
                    <button class="routine-action-btn active">시작</button>
                </li>
                <li class="routine-item">
                    <span class="day-label">Day 2</span>
                    <button class="routine-action-btn">🔒 잠김</button>
                </li>
                <li class="routine-item">
                    <span class="day-label">Day 3</span>
                    <button class="routine-action-btn">🔒 잠김</button>
                </li>
                <li class="routine-item">
                    <span class="day-label">Day 4</span>
                    <button class="routine-action-btn">🔒 잠김</button>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
