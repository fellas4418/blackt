<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TRIGGER · 독해</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cyber-theme.css">
    <link rel="stylesheet" href="pattern.css?v=20260724y">
</head>
<body>
    <div class="pattern-page">
        <div class="pattern-topbar">
            <button type="button" class="pattern-back" id="pattern-back">← 목차</button>
            <div class="pattern-meta" id="pattern-chapter-label"><strong>01</strong> · 주·동·목</div>
            <button type="button" class="pattern-sound-btn is-off" id="pattern-sound-btn" aria-pressed="false" title="도슨트 소리">소리 끔</button>
        </div>

        <div class="pattern-guide is-expanded">
            <div class="pattern-guide-head" id="pattern-guide-head">해석 포인트 <span class="pattern-guide-fold">탭하여 접기</span></div>
            <div class="pattern-guide-body" id="pattern-guide-body"></div>
        </div>

        <div class="pattern-main">
            <div class="pattern-progress is-hidden" id="pattern-progress-wrap" aria-hidden="true">
                <div class="pattern-progress-fill" id="pattern-progress-fill"></div>
            </div>

            <div class="pattern-center-block">
                <div class="pattern-content-center">
                    <p class="pattern-phase-badge" id="pattern-phase-badge"></p>
                    <div class="pattern-stage" id="pattern-stage">
                        <p class="pattern-eng-hero" id="pattern-eng-hero" aria-live="polite"></p>
                        <div class="pattern-guide-beat is-hidden" id="pattern-guide-beat">
                            <p class="pattern-guide-beat-title">해석 포인트</p>
                            <ul class="pattern-guide-beat-list" id="pattern-guide-beat-list"></ul>
                            <p class="pattern-guide-beat-tap">이해했으면 탭하세요</p>
                        </div>
                        <p class="pattern-drill-hint" id="pattern-drill-hint">조사를 골라 붙여 보세요</p>
                        <div class="pattern-cols" id="pattern-cols"></div>
                        <div class="pattern-pool-wrap" id="pattern-pool-wrap">
                            <p class="pattern-pool-label">자리를 표시할 조사를 고르세요</p>
                            <div class="pattern-pool" id="pattern-pool"></div>
                        </div>
                    </div>
                    <div class="pattern-docent is-hidden" id="pattern-docent" aria-live="polite">
                        <div class="pattern-docent-inner">
                            <div class="pattern-docent-role-slot">
                                <p class="pattern-docent-role" id="pattern-docent-role"></p>
                            </div>
                            <div class="pattern-docent-body">
                                <div class="pattern-docent-example-slot" id="pattern-docent-example-slot">
                                    <span class="pattern-docent-example-label">예문</span>
                                    <p class="pattern-docent-example" id="pattern-docent-example"></p>
                                    <p class="pattern-docent-example-kor" id="pattern-docent-example-kor"></p>
                                </div>
                                <p class="pattern-docent-text" id="pattern-docent-text"></p>
                            </div>
                        </div>
                        <p class="pattern-docent-tap" id="pattern-docent-tap">왼쪽 탭: 이전  ·  오른쪽 탭: 다음</p>
                        <p class="pattern-docent-step" id="pattern-docent-step"></p>
                    </div>
                </div>

                <div class="pattern-nav is-hidden" id="pattern-nav">
                    <button type="button" class="pattern-nav-btn" id="pattern-btn-prev" aria-label="이전">←</button>
                    <span class="pattern-nav-counter" id="pattern-step-counter">1 / 6</span>
                    <button type="button" class="pattern-nav-btn" id="pattern-btn-next" aria-label="다음">→</button>
                </div>
            </div>
        </div>
    </div>

    <div class="pattern-complete-overlay" id="pattern-complete">
        <div class="pattern-complete-box">
            <h2 id="pattern-complete-title">연습 완료</h2>
            <p>교재 순서대로 이어가거나, 목차에서 다른 패턴을 골라 보세요.</p>
            <button type="button" class="pattern-btn pattern-btn--next" id="pattern-complete-next" style="display:none;">다음 패턴</button>
            <button type="button" class="pattern-btn pattern-btn--reveal" id="pattern-complete-retry">한 번 더</button>
            <button type="button" class="pattern-btn pattern-back" id="pattern-complete-toc">목차로</button>
            <button type="button" class="pattern-btn pattern-back" id="pattern-complete-close" style="margin-top:4px;border:none;">닫기</button>
        </div>
    </div>

    <script src="pattern.js?v=20260724y"></script>
</body>
</html>
