<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사라져 VOCA - 공유 진입</title>
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --bg: #050505;
            --card: #111;
            --line: #333;
            --txt: #fff;
            --muted: #b0b0b0;
            --accent: #00f3ff;
            --warn: #ff9800;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--txt);
            font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.08);
        }
        h1 { margin: 0 0 10px; font-size: 1.25rem; }
        p { margin: 8px 0; line-height: 1.6; color: var(--muted); }
        .status { color: var(--accent); font-weight: 700; margin-top: 8px; }
        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px 12px;
            font-weight: 800;
            font-size: 0.98rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-warn { background: var(--warn); color: #111; }
        .btn-main { background: var(--accent); color: #111; }
        .small { font-size: 0.86rem; }
        .guide { margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid #444; background: #0d0d0d; }
        .ios-alert {
            margin-top: 12px;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #ff9800;
            background: rgba(255, 152, 0, 0.16);
        }
        .ios-alert-title {
            margin: 0 0 6px;
            font-size: 1rem;
            font-weight: 900;
            color: #ffd08a;
        }
        .ios-alert-desc {
            margin: 0;
            font-size: 0.92rem;
            line-height: 1.6;
            color: #ffe5be;
        }
        .hide { display: none !important; }
    </style>
</head>
<body>
    <div class="card">
        <h1>공유 링크 확인 중...</h1>
        <p id="desc">최적의 방식으로 앱을 열고 있어요.</p>
        <p id="status" class="status">환경을 확인하는 중입니다.</p>
        <p style="margin-top:4px; font-size:0.9rem; color:#9ad7dd;">앱처럼 설치해서 사용하면 다음 접속부터 훨씬 빠르고 편합니다.</p>

        <button id="open-external-btn" class="btn btn-warn hide">브라우저에서 열기</button>
        <button id="continue-btn" class="btn btn-main hide">계속 진행하기</button>

        <div id="ios-alert" class="ios-alert hide">
            <p class="ios-alert-title">아이폰/아이패드는 사파리에서 진행해 주세요</p>
            <p class="ios-alert-desc">1) 위의 '브라우저에서 열기' 버튼을 누르세요.<br>2) 크롬이 열리면 주소를 복사해 사파리에서 열어주세요.<br>3) 사파리에서 더보기(공유) -> 홈 화면에 추가를 눌러주세요.</p>
        </div>

        <div id="guide" class="guide hide">
            <p id="guide-text" class="small"></p>
        </div>
    </div>

    <script>
        (function () {
            const encodeAuthBundle = (name, phone) => {
                try {
                    const payload = JSON.stringify({ n: String(name || ""), p: String(phone || ""), t: Date.now() });
                    return btoa(unescape(encodeURIComponent(payload)));
                } catch (e) {
                    return "";
                }
            };

            const params = new URLSearchParams(location.search);
            const path = (params.get('path') || '/index.html').trim();
            const praise = params.get('praise') === '1';
            const targetPath = path.startsWith('/') ? path : '/' + path;
            const finalUrl = new URL(targetPath, location.origin);
            if (praise) finalUrl.searchParams.set('praise', 'true');

            // 같은 기기에서 카톡 인앱 -> 외부 브라우저로 이동할 때 가입 상태를 1회 전달합니다.
            try {
                const name = String(localStorage.getItem('trigger_name') || '').trim();
                const phone = String(localStorage.getItem('trigger_phone') || '').replace(/[^0-9]/g, '');
                if (name && /^010\d{8}$/.test(phone)) {
                    const au = encodeAuthBundle(name, phone);
                    if (au) finalUrl.searchParams.set('au', au);
                }
            } catch (e) {}

            const ua = navigator.userAgent || '';
            const isKakao = /KAKAO/i.test(ua);
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            const isAndroid = /Android/i.test(ua);
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

            const descEl = document.getElementById('desc');
            const statusEl = document.getElementById('status');
            const openExternalBtn = document.getElementById('open-external-btn');
            const continueBtn = document.getElementById('continue-btn');
            const guide = document.getElementById('guide');
            const guideText = document.getElementById('guide-text');
            const iosAlert = document.getElementById('ios-alert');

            const goFinal = () => { location.replace(finalUrl.toString()); };

            if (!isKakao || isStandalone) {
                statusEl.textContent = '곧 메인 화면으로 이동합니다.';
                setTimeout(goFinal, 350);
                return;
            }

            descEl.textContent = '카카오톡 안에서는 설치 버튼이 보이지 않습니다.';
            statusEl.textContent = '브라우저(크롬/사파리)로 열면 바로 설치할 수 있습니다.';

            const externalUrl = `kakaotalk://web/openExternal?url=${encodeURIComponent(finalUrl.toString())}`;
            openExternalBtn.classList.remove('hide');
            continueBtn.classList.remove('hide');
            guide.classList.remove('hide');

            openExternalBtn.onclick = function () {
                location.href = externalUrl;
                setTimeout(function () {
                    if (document.visibilityState === 'visible') {
                        continueBtn.focus();
                    }
                }, 1200);
            };
            continueBtn.onclick = goFinal;

            if (isAndroid) {
                openExternalBtn.textContent = '크롬 브라우저로 열기';
                guide.classList.add('hide');
            } else if (isIOS) {
                openExternalBtn.textContent = '브라우저에서 열기 (사파리 권장)';
                if (iosAlert) iosAlert.classList.remove('hide');
                guide.classList.add('hide');
            } else {
                guideText.textContent = '브라우저로 열면 설치와 로그인 흐름이 더 안정적으로 동작합니다.';
            }
        })();
    </script>
</body>
</html>
