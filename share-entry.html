<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIGGER BLACK · 공유</title>
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cyber-theme.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --bg: #050505;
            --card: #111;
            --line: #333;
            --txt: #fff;
            --muted: #b0b0b0;
            --accent: #00f3ff;
            --warn: #ff9800;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--txt);
            font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.08);
        }
        h1 { margin: 0 0 10px; font-size: 1.25rem; }
        p { margin: 8px 0; line-height: 1.6; color: var(--muted); }
        .status { color: var(--accent); font-weight: 700; margin-top: 8px; }
        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px 12px;
            font-weight: 800;
            font-size: 0.98rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-warn { background: var(--warn); color: #111; }
        .btn-main { background: var(--accent); color: #111; }
        .small { font-size: 0.86rem; }
        .guide { margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid #444; background: #0d0d0d; }
        .ios-alert {
            margin-top: 12px;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #ff9800;
            background: rgba(255, 152, 0, 0.16);
        }
        .ios-alert-title {
            margin: 0 0 6px;
            font-size: 1rem;
            font-weight: 900;
            color: #ffd08a;
        }
        .ios-alert-desc {
            margin: 0;
            font-size: 0.92rem;
            line-height: 1.6;
            color: #ffe5be;
        }
        .hide { display: none !important; }
    </style>
</head>
<body class="dashboard-bg">
    <div class="card">
        <h1>📍 앱으로 이동 중</h1>
        <p id="desc"></p>
        <p id="status" class="status">잠시만 기다려 주세요…</p>

        <button id="open-external-btn" class="btn btn-warn hide">브라우저(앱)에서 열기</button>
        <button id="continue-btn" class="btn btn-main hide">웹에서 계속 보기</button>

        <div id="ios-alert" class="ios-alert hide">
            <p class="ios-alert-title">아이폰은 홈 화면 앱 아이콘으로 열어 주세요</p>
            <p class="ios-alert-desc">1) 아래 버튼으로 사파리를 연 뒤<br>2) 홈 화면에 추가한 「TRIGGER BLACK」 앱 아이콘을 눌러 주세요.</p>
        </div>

        <div id="guide" class="guide hide">
            <p id="guide-text" class="small"></p>
        </div>
    </div>

    <script>
        (function () {
            const encodeAuthBundle = (name, phone) => {
                try {
                    const payload = JSON.stringify({ n: String(name || ""), p: String(phone || ""), t: Date.now() });
                    return btoa(unescape(encodeURIComponent(payload)));
                } catch (e) {
                    return "";
                }
            };

            const KAKAO_SHARE_ORIGIN = 'https://blackt.pages.dev';
            const params = new URLSearchParams(location.search);
            function normalizeTargetPath(rawPath) {
                const raw = String(rawPath || '/index.html').trim() || '/index.html';
                if (/^[a-z][a-z0-9+.-]*:/i.test(raw) || raw.indexOf('\\') !== -1 || raw.indexOf('//') === 0) {
                    return '/index.html';
                }
                try {
                    const u = new URL(raw.charAt(0) === '/' ? raw : '/' + raw, location.origin);
                    if (u.origin !== location.origin) return '/index.html';
                    return u.pathname || '/index.html';
                } catch (e) {
                    return '/index.html';
                }
            }

            const path = normalizeTargetPath(params.get('path'));
            const praise = params.get('praise') === '1';
            const zone = (params.get('zone') || '').trim();
            const pcParam = params.get('pc');
            const targetPath = path;
            const isVocaPath = /index\.html/i.test(targetPath);
            const refParam = params.get('ref');
            const refTrim = refParam ? String(refParam).trim() : '';
            const isAppReferralShare = isVocaPath && !praise && !pcParam && !!refTrim;
            const isVocaResultShare = isVocaPath && !!pcParam;
            const finalUrl = new URL(
                isAppReferralShare ? '/index.html' : (praise || isVocaResultShare ? '/praise-receiver.html' : targetPath),
                isVocaPath || praise || isAppReferralShare ? KAKAO_SHARE_ORIGIN : location.origin
            );
            if (praise) {
                finalUrl.searchParams.set('praise', 'true');
            } else if (isVocaResultShare) {
                finalUrl.searchParams.set('share_result', '1');
            }
            if (pcParam) finalUrl.searchParams.set('pc', pcParam);
            if (zone) finalUrl.searchParams.set('zone', zone);
            if (refTrim) finalUrl.searchParams.set('ref', refTrim);
            const erParam = params.get('er');
            if (erParam) finalUrl.searchParams.set('er', erParam);

            const isVocaReceiver = praise || (isVocaPath && !!pcParam);

            try {
                const name = String(localStorage.getItem('trigger_name') || '').trim();
                const phone = String(localStorage.getItem('trigger_phone') || '').replace(/[^0-9]/g, '');
                if (name && /^010\d{8}$/.test(phone) && finalUrl.origin === KAKAO_SHARE_ORIGIN && finalUrl.pathname === '/index.html') {
                    const au = encodeAuthBundle(name, phone);
                    if (au) finalUrl.searchParams.set('au', au);
                }
            } catch (e) {}

            const ua = navigator.userAgent || '';
            const isKakao = /KAKAO/i.test(ua);
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            const isAndroid = /Android/i.test(ua);
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            const finalUrlStr = finalUrl.toString();
            const externalUrl = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(finalUrlStr);

            const descEl = document.getElementById('desc');
            const statusEl = document.getElementById('status');
            const openExternalBtn = document.getElementById('open-external-btn');
            const continueBtn = document.getElementById('continue-btn');
            const guide = document.getElementById('guide');
            const guideText = document.getElementById('guide-text');
            const iosAlert = document.getElementById('ios-alert');

            const goFinal = () => { location.replace(finalUrlStr); };

            const openInSystemBrowser = () => {
                location.href = externalUrl;
            };

            const showManualFallback = () => {
                statusEl.textContent = '자동 이동이 안 되면 아래 버튼을 눌러 주세요.';
                openExternalBtn.classList.remove('hide');
                continueBtn.classList.remove('hide');
                guide.classList.remove('hide');
                openExternalBtn.onclick = openInSystemBrowser;
                continueBtn.onclick = goFinal;
                if (isAndroid) {
                    openExternalBtn.textContent = '설치한 앱(크롬)에서 열기';
                    guide.classList.add('hide');
                } else if (isIOS) {
                    openExternalBtn.textContent = '사파리에서 열기';
                    if (iosAlert) iosAlert.classList.remove('hide');
                    guide.classList.add('hide');
                } else {
                    openExternalBtn.textContent = '브라우저에서 열기';
                    guideText.textContent = '홈 화면에 추가한 앱이 있으면, 브라우저 대신 앱 아이콘으로 열면 더 편합니다.';
                }
            };

            if (isStandalone) {
                goFinal();
                return;
            }

            if (isKakao && isVocaReceiver) {
                goFinal();
                return;
            }

            if (isKakao && zone === 'exam') {
                descEl.textContent = '카톡 안에서는 앱이 바로 안 열려요. 설치한 앱으로 연결합니다.';
                statusEl.textContent = '브라우저로 이동 중…';
                openInSystemBrowser();
                setTimeout(showManualFallback, 1400);
                return;
            }

            if (isKakao) {
                descEl.textContent = '카톡 안에서는 앱이 바로 안 열려요. 설치한 앱으로 연결합니다.';
                statusEl.textContent = '브라우저로 이동 중…';
                openInSystemBrowser();
                setTimeout(showManualFallback, 1400);
                return;
            }

            descEl.textContent = '';
            statusEl.textContent = '앱으로 이동합니다…';

            (async function routeToApp() {
                if (navigator.getInstalledRelatedApps) {
                    try {
                        const related = await navigator.getInstalledRelatedApps();
                        if (related && related.length > 0) {
                            goFinal();
                            return;
                        }
                    } catch (e) {}
                }
                setTimeout(goFinal, 280);
            })();
        })();
    </script>
</body>
</html>
