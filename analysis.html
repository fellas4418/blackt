<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 분석 - Trigger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #050505; color: #fff; padding: 20px; font-family: 'Pretendard', sans-serif; }
        .camera-ui { width: 100%; min-height: 200px; max-height: 40vh; background: #111; border: 2px dashed var(--neon-blue); border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-bottom: 10px; }
        #preview { width: 100%; height: 100%; object-fit: contain; display: none; }
        .guide-box { background: rgba(255, 153, 0, 0.1); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid rgba(255, 153, 0, 0.3); }
        .guide-title { color: var(--neon-orange); font-weight: bold; margin: 0 0 6px 0; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .guide-list { color: #ccc; font-size: 0.8rem; margin: 0; padding-left: 18px; line-height: 1.5; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #edit-section, #result-section { display: none; animation: fadeInUp 0.6s ease-out; }
        
        /* [스마트 편집기 스타일] */
        .editable-area { 
            width: 100%; min-height: 180px; max-height: 300px; 
            background: #111; color: #fff; border: 1px solid #333; 
            border-radius: 12px; padding: 15px; font-size: 1rem; 
            line-height: 1.8; overflow-y: auto; outline: none; 
            word-break: break-all; margin-bottom: 15px; box-sizing: border-box;
        }
        /* 오타 의심 구간 하이라이트 */
        .highlight { 
            color: var(--neon-orange); 
            text-decoration: underline wavy var(--neon-orange); 
            background: rgba(255, 153, 0, 0.1); 
            padding: 0 2px; border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="nav-area">
        <div onclick="location.href='index.html?tab=analysis'" style="color: var(--neon-blue); margin-bottom: 15px; cursor: pointer;">← 분석 설정으로 돌아가기</div>
        <h3 id="info-header" style="color: #fff; margin-bottom: 15px;">시험지 분석</h3>
    </div>

    <div id="input-section">
        <div class="guide-box">
            <p class="guide-title">💡 실패 없는 분석을 위한 팁</p>
            <ul class="guide-list">
                <li>분석할 <strong>오답 문항 1~2개</strong>가 화면에 꽉 차게 찍어주세요.</li>
                <li>기울어지지 않게 위에서 <strong>수직으로</strong> 촬영해 주세요.</li>
                <li>글자가 잘 보이도록 <strong>그림자</strong>가 지지 않게 주의해 주세요.</li>
            </ul>
        </div>
        <div class="camera-ui">
            <span id="label" style="color: #444;">팍팍! 하지만 선명하게! 찍어주세요</span>
            <img id="preview">
        </div>
        
        <input type="file" id="capture" accept="image/*" style="display:none" onchange="loadImg(this)">
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="openPicker('camera')" class="login-btn" style="flex: 1; border-color: var(--neon-green); margin-top: 0; font-size: 0.9rem;">실시간 촬영 📸</button>
            <button onclick="openPicker('gallery')" class="login-btn" style="flex: 1; border-color: var(--neon-blue); margin-top: 0; font-size: 0.9rem;">이미지 불러오기 🖼️</button>
        </div>

        <div id="ai-btn-area" style="display:none; margin-top: 15px;">
            <button id="ocr-btn" onclick="runOCR()" class="start-btn" style="border-color: var(--neon-orange);">글자 읽기 및 검수 🔍</button>
        </div>
    </div>

    <div id="edit-section">
        <div class="guide-box" style="border-color: var(--neon-blue);">
            <p class="guide-title" style="color: var(--neon-blue);">✍️ 주황색 부분을 확인해 주세요</p>
            <p style="color:#ccc; font-size:0.8rem; margin:0;">낙서나 기호로 인식된 주황색 글자를 터치해 올바르게 수정하세요.</p>
        </div>
        <div id="ocr-edit-area" class="editable-area" contenteditable="true"></div>
        <button id="run-btn" onclick="runFinalAnalysis()" class="start-btn" style="border-color: var(--neon-orange);">검수 완료 및 AI 정밀 분석 실행 🚀</button>
    </div>

    <div id="result-section">
        <div style="background: rgba(57, 255, 20, 0.05); border: 1px solid var(--neon-green); padding: 20px; border-radius: 15px;">
            <h4 style="color: var(--neon-green); margin-top: 0; display: flex; align-items: center; gap: 8px;">✅ AI 정밀 처방전</h4>
            <div id="ai-comment" style="line-height: 1.7; color: #eee; font-size: 0.95rem; word-break: keep-all;"></div>
            <button onclick="location.href='index.html?tab=analysis'" class="login-btn" style="border-color: #fff; margin-top: 25px; background: transparent; width: 100%;">다른 문항 분석하기</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade') || '';
        const type = params.get('type') || '';
        document.getElementById('info-header').innerText = `${grade} ${type} 분석 중`;

        function openPicker(type) {
            const input = document.getElementById('capture');
            if (type === 'camera') input.setAttribute('capture', 'environment');
            else input.removeAttribute('capture');
            input.click();
        }
    
        function loadImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('label').style.display = 'none';
                    document.getElementById('ai-btn-area').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    
        async function runOCR() {
            const img = document.getElementById('preview');
            const ocrBtn = document.getElementById('ocr-btn');
            if (!img.src || img.style.display === 'none') { alert("사진을 선택해 주세요!"); return; }
    
            ocrBtn.disabled = true;
            ocrBtn.innerText = "🔍 글자를 분석하는 중...";
            ocrBtn.style.opacity = "0.7";
    
            try {
                const worker = await Tesseract.createWorker('kor+eng');
                const { data: { text } } = await worker.recognize(img.src);
                await worker.terminate();
                
                // [오타 유추 및 하이라이트 로직]
                const processedHtml = text.split(/(\s+)/).map(word => {
                    // 특수 기호가 섞여있거나, 너무 짧은 외계어는 주황색 하이라이트 처리
                    const isSuspicious = /[^a-zA-Z0-9가-힣\s,.?!]/.test(word) || (word.length > 0 && word.length < 2 && !/[aI]/.test(word));
                    if (isSuspicious && word.trim().length > 0) {
                        return `<span class="highlight">${word}</span>`;
                    }
                    return word;
                }).join('');

                document.getElementById('input-section').style.display = 'none';
                document.getElementById('edit-section').style.display = 'block';
                document.getElementById('ocr-edit-area').innerHTML = processedHtml;
            } catch (error) {
                alert("인식 오류 발생");
                ocrBtn.disabled = false;
                ocrBtn.innerText = "글자 읽기 시작 🔍";
            }
        }
    
        async function runFinalAnalysis() {
            // contenteditable 영역에서 텍스트만 추출
            const editedText = document.getElementById('ocr-edit-area').innerText;
            const runBtn = document.getElementById('run-btn');
            if (!editedText.trim()) { alert("분석할 내용이 없습니다."); return; }

            runBtn.disabled = true;
            runBtn.innerText = "🧠 AI 정밀 분석 중...";

            try {
                const response = await fetch("https://trigger-ocr-api.ohryee.workers.dev/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            {
                                role: "system",
                                content: `너는 영어 교육 전문가이자 트리거 학습팀의 AI 튜터야. 
                                학생의 시험지 텍스트를 보고 다음 3가지를 분석하라.
                                1. category: 5개 카테고리 [문장 성분, 준동사(분사구문 포함), 연결사(관계사 포함), 동사 파트, 특수 구문] 중 하나 선택.
                                2. cause: 학생이 왜 틀렸는지 핵심 원인을 전문적으로 분석.
                                3. solution: 이 오답을 극복하기 위해 다시 공부해야 할 개념과 대안을 상세히 제시.
                                모든 응답은 반드시 JSON 형식으로 하라.`
                            },
                            {
                                role: "user",
                                content: `{"grade": "${grade}", "type": "${type}", "text": "${editedText.substring(0, 1000)}"}`
                            }
                        ],
                        response_format: { "type": "json_object" },
                        temperature: 0.3
                    })
                });
    
                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);
                
                document.getElementById('edit-section').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';
                
                const commentArea = document.getElementById('ai-comment');
                commentArea.innerHTML = `
                    <div style="margin-bottom: 15px;">
                        <span style="background: var(--neon-blue); color: #000; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 0.85rem;">${result.category}</span>
                    </div>
                    
                    <div style="background: rgba(255,153,0,0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 3px solid var(--neon-orange);">
                        <p style="color: var(--neon-orange); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px;">🚩 오답 원인 분석</p>
                        <p style="color: #eee; font-size: 0.95rem; line-height: 1.6;">${result.cause}</p>
                    </div>

                    <div style="background: rgba(0,243,255,0.05); padding: 15px; border-radius: 10px; border-left: 3px solid var(--neon-blue);">
                        <p style="color: var(--neon-blue); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px;">💡 트리거 학습 처방</p>
                        <p style="color: #eee; font-size: 0.95rem; line-height: 1.6;">${result.solution}</p>
                    </div>
                `;
    
            } catch (error) {
                alert("AI 분석 중 오류가 발생했습니다.");
                runBtn.disabled = false;
                runBtn.innerText = "검수 완료 및 AI 정밀 분석 실행 🚀";
            }
        }
    </script>
</body>
</html>
