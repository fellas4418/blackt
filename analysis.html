<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 지문 정밀 분석 - Trigger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #050505; color: #fff; padding: 20px; font-family: 'Pretendard', sans-serif; }
        .camera-ui { width: 100%; min-height: 200px; max-height: 40vh; background: #111; border: 2px dashed var(--neon-blue); border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-bottom: 10px; }
        #preview { width: 100%; height: 100%; object-fit: contain; display: none; }
        .guide-box { background: rgba(0, 243, 255, 0.05); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(0, 243, 255, 0.2); }
        .guide-title { color: var(--neon-blue); font-weight: bold; margin-bottom: 8px; font-size: 1rem; }
        .guide-text { color: #ccc; font-size: 0.85rem; line-height: 1.6; margin: 0; }
        
        #edit-section, #result-section { display: none; animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .editable-area { 
            width: 100%; min-height: 180px; max-height: 300px; 
            background: #111; color: #fff; border: 1px solid #333; 
            border-radius: 12px; padding: 15px; font-size: 1rem; 
            line-height: 1.8; overflow-y: auto; outline: none; 
            word-break: break-all; margin-bottom: 15px; box-sizing: border-box;
        }
        .highlight { color: var(--neon-orange); text-decoration: underline wavy var(--neon-orange); background: rgba(255, 153, 0, 0.1); padding: 0 2px; border-radius: 3px; }
        
        .result-card { background: rgba(255, 255, 255, 0.03); border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .result-label { font-size: 0.8rem; color: var(--neon-blue); font-weight: bold; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        .result-content { font-size: 0.95rem; line-height: 1.7; color: #eee; }
        
        .translation-row { border-bottom: 1px solid #222; padding: 12px 0; }
        .translation-row:last-child { border-bottom: none; }
        .eng-text { font-size: 0.85rem; color: #888; margin-bottom: 4px; }
        .kor-text { font-size: 0.95rem; color: var(--neon-green); font-weight: 500; }

        .kakao-btn { width: 100%; padding: 18px; background: #fee500; color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 1.05rem; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>
    <div id="nav-area">
        <div onclick="location.href='index.html?tab=analysis'" style="color: var(--neon-blue); margin-bottom: 15px; cursor: pointer;">← 분석 설정으로 돌아가기</div>
        <h3 id="info-header" style="color: #fff; margin-bottom: 15px;">AI 지문 정밀 분석</h3>
    </div>

    <div id="input-section">
        <div class="guide-box">
            <p class="guide-title">📷 지문 분석 & 배경지식 도우미</p>
            <p class="guide-text">
                지문을 촬영하면 <strong>주제, 해석, 배경지식</strong>을 즉시 분석합니다.<br>
                낙서가 심하면 인식이 어려우니, 최대한 선명하게 찍어주세요.
            </p>
        </div>

        <div class="camera-ui">
            <span id="label" style="color: #444;">지문을 수평으로 찍어주세요</span>
            <img id="preview">
        </div>
        
        <input type="file" id="capture" accept="image/*" style="display:none" onchange="loadImg(this)">
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="openPicker('camera')" class="login-btn" style="flex: 1; border-color: var(--neon-green); margin-top: 0;">실시간 촬영 📸</button>
            <button onclick="openPicker('gallery')" class="login-btn" style="flex: 1; border-color: var(--neon-blue); margin-top: 0;">사진 선택 🖼️</button>
        </div>

        <div id="ai-btn-area" style="display:none; margin-top: 15px;">
            <button id="ocr-btn" onclick="runOCR()" class="start-btn" style="border-color: var(--neon-orange);">글자 읽기 및 검수 🔍</button>
        </div>
        
        <div style="margin-top: 25px; text-align: center;">
            <button onclick="showDirectInput()" style="background: transparent; border: 1px solid #444; color: #888; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">지문 직접 붙여넣기 ✍️</button>
        </div>
    </div>

    <div id="edit-section">
        <div class="guide-box" style="border-color: var(--neon-orange);">
            <p class="guide-title" style="color: var(--neon-orange);">✍️ 지문 검수</p>
            <p class="guide-text">잘못 읽힌 부분을 고쳐주세요. 지문이 정확할수록 분석이 정교해집니다.</p>
        </div>
        <div id="ocr-edit-area" class="editable-area" contenteditable="true"></div>
        <button id="run-btn" onclick="runFinalAnalysis()" class="start-btn" style="border-color: var(--neon-orange);">정밀 분석 실행 🚀</button>
    </div>

    <div id="result-section">
        <div style="margin-bottom: 25px;">
            <h4 style="color: var(--neon-green); margin-top: 0;">✅ AI 정밀 진단 보고서</h4>
            <div id="ai-report-area"></div>
        </div>

        <div class="guide-box" style="border-color: #fee500; background: rgba(254, 229, 0, 0.05);">
            <p class="guide-title" style="color: #fee500;">🆘 1:1 오답 상담</p>
            <p class="guide-text" style="color: #eee;">이해가 안 가는 문법이나 왜 틀렸는지 궁금하다면 트리거 팀에 직접 물어보세요!</p>
            <button onclick="window.open('https://open.kakao.com/o/siKCrAqi', '_blank')" class="kakao-btn">💬 트리거 팀에 카톡 상담 요청</button>
        </div>

        <button onclick="location.href='index.html?tab=analysis'" class="login-btn" style="border-color: #fff; margin-top: 20px; background: transparent; width: 100%;">다른 지문 분석하기</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade') || '';
        const type = params.get('type') || '';

        function openPicker(type) {
            const input = document.getElementById('capture');
            if (type === 'camera') input.setAttribute('capture', 'environment');
            else input.removeAttribute('capture');
            input.click();
        }
    
        function loadImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('label').style.display = 'none';
                    document.getElementById('ai-btn-area').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function showDirectInput() {
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('edit-section').style.display = 'block';
            document.getElementById('ocr-edit-area').focus();
        }
    
        async function runOCR() {
            const img = document.getElementById('preview');
            const ocrBtn = document.getElementById('ocr-btn');
            ocrBtn.disabled = true; ocrBtn.innerText = "🔍 글자 읽는 중...";
            try {
                const worker = await Tesseract.createWorker('kor+eng');
                const { data: { text } } = await worker.recognize(img.src);
                await worker.terminate();
                document.getElementById('input-section').style.display = 'none';
                document.getElementById('edit-section').style.display = 'block';
                document.getElementById('ocr-edit-area').innerText = text;
            } catch (error) { alert("인식 오류 발생"); ocrBtn.disabled = false; }
        }
    
        async function runFinalAnalysis() {
            const editedText = document.getElementById('ocr-edit-area').innerText;
            const runBtn = document.getElementById('run-btn');
            if (!editedText.trim()) { alert("지문을 입력해 주세요."); return; }

            runBtn.disabled = true; runBtn.innerText = "🧠 AI 심층 분석 중...";

            try {
                const response = await fetch("https://trigger-ocr-api.ohryee.workers.dev/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            {
                                role: "system",
                                content: `영어 교육 전문가로서 다음 지문을 분석하여 JSON으로 응답하라.
                                1. background: 이 지문의 소재와 관련된 학생들이 알기 쉬운 배경지식 설명 (3줄)
                                2. subject: 지문의 핵심 주제 (한국어)
                                3. sentence_analysis: 지문의 주요 문장 3~4개를 골라 원문(eng)과 자연스러운 한 줄 해석(kor) 제공
                                4. keywords: 핵심 단어 5개와 뜻`
                            },
                            {
                                role: "user",
                                content: `지문: ${editedText.substring(0, 1500)}`
                            }
                        ],
                        response_format: { "type": "json_object" }
                    })
                });
    
                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);
                
                document.getElementById('edit-section').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';
                
                let transHtml = res.sentence_analysis.map(s => `
                    <div class="translation-row">
                        <div class="eng-text">${s.eng}</div>
                        <div class="kor-text">${s.kor}</div>
                    </div>
                `).join('');

                document.getElementById('ai-report-area').innerHTML = `
                    <div class="result-card" style="border-left: 4px solid var(--neon-orange);">
                        <span class="result-label" style="color:var(--neon-orange);">💡 지문 배경지식</span>
                        <div class="result-content">${res.background}</div>
                    </div>
                    <div class="result-card">
                        <span class="result-label">📍 핵심 주제</span>
                        <div class="result-content" style="color:var(--neon-blue); font-weight:bold;">${res.subject}</div>
                    </div>
                    <div class="result-card">
                        <span class="result-label">📝 주요 문장 한 줄 해석</span>
                        <div class="result-content">${transHtml}</div>
                    </div>
                    <div class="result-card">
                        <span class="result-label">🔑 필수 키워드</span>
                        <div class="result-content">${res.keywords.join(', ')}</div>
                    </div>
                `;
            } catch (error) { alert("분석 실패"); runBtn.disabled = false; }
        }
    </script>
</body>
</html>
