<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 지문 정밀 분석 - Trigger</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #050505; color: #fff; padding: 20px; font-family: 'Pretendard', sans-serif; }
        .camera-ui { width: 100%; min-height: 200px; max-height: 40vh; background: #111; border: 2px dashed var(--neon-blue); border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-bottom: 10px; }
        #preview { width: 100%; height: 100%; object-fit: contain; display: none; }
        .guide-box { background: rgba(0, 243, 255, 0.05); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(0, 243, 255, 0.2); }
        .guide-title { color: var(--neon-blue); font-weight: bold; margin-bottom: 8px; font-size: 1rem; }
        .guide-text { color: #ccc; font-size: 0.85rem; line-height: 1.6; margin: 0; }
        #edit-section, #result-section { display: none; animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .editable-area { width: 100%; min-height: 180px; max-height: 300px; background: #111; color: #fff; border: 1px solid #333; border-radius: 12px; padding: 15px; font-size: 1rem; line-height: 1.8; overflow-y: auto; outline: none; word-break: break-all; margin-bottom: 15px; box-sizing: border-box; }
        .result-card { background: rgba(255, 255, 255, 0.03); border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .result-label { font-size: 0.8rem; color: var(--neon-blue); font-weight: bold; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        .result-content { font-size: 0.95rem; line-height: 1.7; color: #eee; }
        .translation-row { border-bottom: 1px solid #222; padding: 12px 0; }
        .translation-row:last-child { border-bottom: none; }
        .eng-text { font-size: 0.85rem; color: #888; margin-bottom: 4px; font-style: italic; }
        .kor-text { font-size: 0.95rem; color: var(--neon-green); font-weight: 500; }
        .kakao-btn { width: 100%; padding: 18px; background: #fee500; color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 1.05rem; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* 👇 새롭게 추가된 AI 분석결과 스타일 👇 */
        .hl-voca { border-bottom: 2px dashed rgba(57, 255, 20, 0.6); padding-bottom: 2px; cursor: help; transition: 0.2s; }
        .hl-voca:hover { background: rgba(57, 255, 20, 0.2); }
        .grammar-box { background: rgba(181, 55, 242, 0.1); border-left: 3px solid #bc13fe; padding: 12px; margin-bottom: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="nav-area">
        <div onclick="location.href='index.html?tab=analysis'" style="color: var(--neon-blue); margin-bottom: 15px; cursor: pointer;">← 분석 설정으로 돌아가기</div>
        <h3 id="info-header" style="color: #fff; margin-bottom: 15px;">AI 지문 정밀 분석</h3>
    </div>

    <div id="input-section">
        <div class="guide-box">
            <p class="guide-title">📷 AI 지문 분석 & 트리거 팀 코멘트</p>
            <p class="guide-text">지문을 촬영하면 <strong>트리거 AI의 실시간 정밀 분석</strong>이 시작됩니다. 선명하게 찍을수록 정확도가 올라갑니다.</p>
        </div>
        <div class="camera-ui"><span id="label" style="color: #444;">지문을 수평으로 찍어주세요</span><img id="preview"></div>
        <input type="file" id="capture" accept="image/*" style="display:none" onchange="loadImg(this)">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="openPicker('camera')" class="login-btn" style="flex: 1; border-color: var(--neon-green); margin-top: 0;">실시간 촬영 📸</button>
            <button onclick="openPicker('gallery')" class="login-btn" style="flex: 1; border-color: var(--neon-blue); margin-top: 0;">사진 선택 🖼️</button>
        </div>
        <div id="ai-btn-area" style="display:none; margin-top: 15px;">
            <button id="ocr-btn" onclick="runGeminiAnalysis()" class="start-btn" style="border-color: var(--neon-orange);">트리거 AI 정밀 분석 시작 🔍</button>
        </div>
        <div style="margin-top: 25px; text-align: center;"><button onclick="showDirectInput()" style="background: transparent; border: 1px solid #444; color: #888; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">지문 직접 붙여넣기 ✍️</button></div>
    </div>

    <div id="edit-section">
        <div class="guide-box" style="border-color: var(--neon-orange);"><p class="guide-title" style="color: var(--neon-orange);">✍️ 지문 직접 입력</p><p class="guide-text">분석할 지문을 입력해주세요. 텍스트가 정확할수록 분석이 정교해집니다.</p></div>
        <div id="ocr-edit-area" class="editable-area" contenteditable="true"></div>
        <button id="run-btn" onclick="runGeminiAnalysis(true)" class="start-btn" style="border-color: var(--neon-orange);">정밀 분석 실행 🚀</button>
    </div>

    <div id="result-section">
        <div style="margin-bottom: 25px;"><h4 style="color: var(--neon-green); margin-top: 0;">✅ AI 정밀 진단 보고서</h4><div id="ai-report-area"></div></div>
        
        <div class="guide-box" style="border-color: #b537f2; background: rgba(181, 55, 242, 0.05); margin-top: 25px;">
            <p class="guide-title" style="color: #d789ff; font-size:1.1rem;">🔥 근본적인 독해력을 올리고 싶다면?</p>
            <p class="guide-text" style="color: #eee; font-size:0.95rem;">단어는 아는데 해석이 턱턱 막히고 문장 구조가 안 보이시나요?<br>특수 구문부터 필수 문법까지 <b>단 3시간 만에 뚫어내는 기적의 커리큘럼.</b></p>
            <button onclick="window.open('https://tri3.imweb.me/', '_blank')" class="kakao-btn" style="background:#b537f2; color:#fff; border-radius:12px;">👉 된다니까 3시간 영문법 수강하기 ⚡</button>
        </div>

        <button onclick="location.reload()" class="login-btn" style="border-color: #fff; margin-top: 20px; background: transparent; width: 100%;">다른 지문 분석하기</button>
    </div>

    <script>
        const WORKER_URL = 'https://trigger-ocr-api.ohryee.workers.dev/'; 
        const KAKAO_OPEN_CHAT = 'https://open.kakao.com/o/siKCrAqi';

        const params = new URLSearchParams(window.location.search);
        const info = `${params.get('grade') || ''} ${params.get('type') || ''} ${params.get('detail') || ''}`;
        document.getElementById('info-header').innerText = info + " 분석";

        let selectedBase64 = "";

        function openPicker(type) {
            const input = document.getElementById('capture');
            if (type === 'camera') input.setAttribute('capture', 'environment');
            else input.removeAttribute('capture');
            input.click();
        }
    
        function loadImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedBase64 = e.target.result.split(',')[1];
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('label').style.display = 'none';
                    document.getElementById('ai-btn-area').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function showDirectInput() {
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('edit-section').style.display = 'block';
            document.getElementById('ocr-edit-area').focus();
        }
    
        async function runGeminiAnalysis(isTextMode = false) {
            const editArea = document.getElementById('ocr-edit-area');
            const editedText = (editArea.innerText || editArea.textContent || "").trim();
            const ocrBtn = document.getElementById('ocr-btn');
            const runBtn = document.getElementById('run-btn');
            const activeBtn = isTextMode ? runBtn : ocrBtn;

            if (isTextMode && editedText === "") {
                alert("분석할 지문을 입력해주세요!");
                return;
            }

            activeBtn.disabled = true;
            activeBtn.innerText = "🧠 트리거 AI 정밀 분석 중...";

            try {
                let payload;
                // 👇 프롬프트 업데이트 (뜻 강제 추가)
                const prompt = `당신은 대한민국 최고의 1타 영어 강사입니다. 입력된 지문을 분석하여 반드시 순수한 JSON 형식으로만 응답하세요. 마크다운 태그(\`\`\`json 등)는 생략하세요.
형식:
{
  "background": "지문을 요약하지 마세요. 지문에 등장하는 경제, 철학, 역사적 개념이나 전문 용어 등 글을 이해하는 데 필요한 '외부 배경지식'을 3~4줄로 흥미롭게 설명하세요.",
  "subject": {
    "formal": "글의 핵심 주제를 모의고사 해설지처럼 격식 있는 한 문장으로 요약",
    "easy": "국어 능력이 부족한 중학생도 단번에 이해할 수 있게 비유나 쉬운 일상어로 풀어쓴 주제 (시작말: '그러니까 한마디로~')"
  },
  "full_translation": [
    { "eng": "원문 문장", "kor": "해당 문장의 한국어 해석" }
  ],
  "grammar": [
    { "point": "핵심 문법 개념명 (예: it-that 가주어/진주어, 도치 등)", "sentence": "문법이 적용된 영어 원문", "explanation": "학생이 딱 보고 '아하!' 할 수 있는 쉽고 명쾌한 해석 팁" }
  ],
  "keywords": ["determine(결정하다)", "evolution(진화)"] 
}`;

                // 구글 API 공식 규격에 맞게 페이로드 조립
                if (!isTextMode && selectedBase64) {
                    const img = document.getElementById('preview');
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const maxWidth = 800; 
                    const scale = img.naturalWidth > maxWidth ? maxWidth / img.naturalWidth : 1;
                    canvas.width = img.naturalWidth * scale;
                    canvas.height = img.naturalHeight * scale;
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const finalImageData = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                    payload = {
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/jpeg", data: finalImageData } }
                            ]
                        }],
                        generationConfig: { temperature: 0.1, responseMimeType: "application/json" }
                    };
                } else {
                    payload = {
                        contents: [{
                            parts: [
                                { text: prompt },
                                { text: editedText }
                            ]
                        }],
                        generationConfig: { temperature: 0.1, responseMimeType: "application/json" }
                    };
                }

                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                // 결과창 노출
                document.getElementById('input-section').style.display = 'none';
                document.getElementById('edit-section').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';

                // API 반환 형태에 따른 유연한 파싱
                let res = data;
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let cleanJsonStr = data.candidates[0].content.parts[0].text;
                    const startIndex = cleanJsonStr.indexOf('{');
                    const endIndex = cleanJsonStr.lastIndexOf('}');
                    if (startIndex !== -1 && endIndex !== -1) {
                        cleanJsonStr = cleanJsonStr.substring(startIndex, endIndex + 1);
                    }
                    res = JSON.parse(cleanJsonStr);
                }

                // 1. 배경지식 & 주제 파싱
                let backgroundHtml = res.background || '내용 확인 중';
                let subjectHtml = `
                    <div style="font-weight:bold; color:var(--neon-blue); margin-bottom:8px;">${res.subject?.formal || '요약 중'}</div>
                    <div style="font-size:0.9rem; color:#aaa; background:#222; padding:10px; border-radius:8px; line-height: 1.5;">💡 ${res.subject?.easy || ''}</div>
                `;

                // 2. 전체 문장 해석 & 키워드 자동 하이라이트
                let transHtml = '';
                if(res.full_translation && Array.isArray(res.full_translation)) {
                    transHtml = res.full_translation.map(s => {
                        let highlightedEng = s.eng;
                        // 추출된 키워드를 찾아 문장 내에서 은은한 밑줄 효과 처리
                        if (res.keywords && Array.isArray(res.keywords)) {
                            res.keywords.forEach(kw => {
                                const pureWord = kw.split('(')[0].replace(/[^a-zA-Z]/g, '').trim(); 
                                if (pureWord.length > 2) {
                                    const regex = new RegExp(`\\b(${pureWord})\\b`, "gi");
                                    highlightedEng = highlightedEng.replace(regex, "<span class='hl-voca'>$&</span>");
                                }
                            });
                        }
                        return `
                        <div class="translation-row">
                            <div class="eng-text" style="font-size:1rem; color:#fff;">${highlightedEng}</div>
                            <div class="kor-text" style="font-size:0.95rem; color:#aaa;">${s.kor}</div>
                        </div>`;
                    }).join('');
                } else {
                    transHtml = "<div class='kor-text'>전체 문장 해석을 준비 중입니다.</div>";
                }

                // 3. 주요 문법 분석
                let grammarHtml = '';
                if(res.grammar && res.grammar.length > 0) {
                    grammarHtml = res.grammar.map(g => `
                        <div class="grammar-box">
                            <strong style="color:#bc13fe; display:block; margin-bottom:4px;">⚡ ${g.point}</strong>
                            <div style="color:#ddd; font-size:0.85rem; font-style:italic; margin-bottom:6px;">"${g.sentence}"</div>
                            <div style="color:#eee; font-size:0.9rem;">${g.explanation}</div>
                        </div>
                    `).join('');
                } else {
                    grammarHtml = '<div style="color:#888; font-size:0.9rem;">특이한 특수 구문은 발견되지 않았습니다.</div>';
                }

                // 4. 화면 출력
                document.getElementById('ai-report-area').innerHTML = `
                    <div class="result-card" style="border-color: var(--neon-orange);"><span class="result-label" style="color:var(--neon-orange);">🌎 쓸데없이 고퀄인 배경지식</span><div class="result-content">${backgroundHtml}</div></div>
                    <div class="result-card"><span class="result-label" style="color:var(--neon-blue);">🎯 직관적 주제 요약</span><div class="result-content">${subjectHtml}</div></div>
                    <div class="result-card" style="border-color: #bc13fe;"><span class="result-label" style="color:#bc13fe;">🛠️ 1타 강사의 문법 포인트</span><div class="result-content">${grammarHtml}</div></div>
                    <div class="result-card"><span class="result-label" style="color:var(--neon-green);">📝 전체 지문 완벽 번역</span><div class="result-content">${transHtml}</div></div>
                    <div class="result-card"><span class="result-label" style="color:#ff0055;">🔑 필수 키워드 (원문에서 점선으로 표시됨)</span>
                        <div class="result-content" style="font-weight:bold;">${(res.keywords || []).join(' / ')}</div>
                    </div>
                `;

            } catch (error) {
                console.error("Analysis Error:", error);
                alert("현재 접속자가 많아 정밀 분석이 지연되고 있습니다.\n\n수동 분석을 위해 오픈채팅방으로 이동합니다!\n채팅방에 [이름/학교]를 남겨주세요.");
                activeBtn.disabled = false;
                activeBtn.innerText = isTextMode ? "정밀 분석 실행 🚀" : "트리거 AI 정밀 분석 시작 🔍";
                window.location.href = KAKAO_OPEN_CHAT;
            }
        }
    </script>
</body>
</html>
