<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 분석 - Trigger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #050505; color: #fff; padding: 20px; font-family: 'Pretendard', sans-serif; }
        
        .camera-ui { 
            width: 100%; 
            min-height: 200px; 
            max-height: 40vh;
            background: #111; 
            border: 2px dashed var(--neon-blue); 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            overflow: hidden; 
            margin-bottom: 10px;
        }
        
        #preview { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        .guide-box { background: rgba(255, 153, 0, 0.1); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid rgba(255, 153, 0, 0.3); }
        .guide-title { color: var(--neon-orange); font-weight: bold; margin: 0 0 6px 0; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .guide-list { color: #ccc; font-size: 0.8rem; margin: 0; padding-left: 18px; line-height: 1.5; }
    </style>
</head>
<body>
    <div onclick="location.href='index.html?tab=analysis'" style="color: var(--neon-blue); margin-bottom: 15px; cursor: pointer;">← 분석 설정으로 돌아가기</div>
    
    <h3 id="info-header" style="color: #fff; margin-bottom: 15px;">시험지 분석</h3>

    <div class="guide-box">
        <p class="guide-title">💡 실패 없는 분석을 위한 팁</p>
        <ul class="guide-list">
            <li>분석할 <strong>오답 문항 1~2개</strong>가 화면에 꽉 차게 찍어주세요.</li>
            <li>기울어지지 않게 위에서 <strong>수직으로</strong> 촬영해 주세요.</li>
            <li>글자가 잘 보이도록 <strong>그림자</strong>가 지지 않게 주의해 주세요.</li>
        </ul>
    </div>

    <div class="camera-ui">
        <span id="label" style="color: #444;">팍팍! 하지만 선명하게! 찍어주세요</span>
        <img id="preview">
    </div>

    <input type="file" id="capture" accept="image/*" capture="environment" style="display:none" onchange="loadImg(this)">
    
    <button onclick="document.getElementById('capture').click()" class="login-btn" style="border-color: var(--neon-green); margin-top: 15px;">사진 촬영 시작 📸</button>

    <div id="ai-btn-area" style="display:none; margin-top: 15px;">
        <button onclick="runOCR()" class="start-btn" style="border-color: var(--neon-orange);">AI 정밀 분석 실행 🚀</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade') || '';
        const type = params.get('type') || '';
        document.getElementById('info-header').innerText = `${grade} ${type} 분석 중`;

        function loadImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('label').style.display = 'none';
                    document.getElementById('ai-btn-area').style.display = 'block';
                    
                    // 새 사진 찍으면 버튼 초기화
                    const btn = document.querySelector('.start-btn');
                    btn.disabled = false;
                    btn.innerText = "AI 정밀 분석 실행 🚀";
                    btn.style.opacity = "1";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function runOCR() {
            const img = document.getElementById('preview');
            const btn = document.querySelector('.start-btn');

            if (!img.src || img.style.display === 'none') {
                alert("먼저 시험지 사진을 촬영해 주세요!");
                return;
            }

            // [로직 추가] 버튼 상태 변경 및 로딩 문구 삽입
            btn.disabled = true;
            btn.innerText = "🧠 뇌가 시험지를 읽는 중입니다...";
            btn.style.opacity = "0.7";

            try {
                // Tesseract 워커 생성 (한국어 + 영어)
                const worker = await Tesseract.createWorker('kor+eng');
                
                // OCR 실행
                const { data: { text } } = await worker.recognize(img.src);
                
                console.log("추출된 텍스트 데이터:", text);

                // 분석 완료 후 워커 종료
                await worker.terminate();
                
                // 결과 확인용 알림
                alert("추출 성공! 이제 트리거 팀의 AI 처방전을 조제합니다.");
                
                // 다음 단계를 위해 버튼 텍스트 변경
                btn.innerText = "분석 완료 ✅";
                
                // TODO: 추출된 text 변수를 GPT API로 전송하는 로직 연결 예정
                
            } catch (error) {
                console.error("OCR 분석 에러:", error);
                alert("인식 중 오류가 발생했습니다. 다시 촬영해 주세요.");
                btn.disabled = false;
                btn.innerText = "AI 정밀 분석 실행 🚀";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
